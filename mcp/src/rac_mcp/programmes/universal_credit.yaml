name: universal_credit
title: Universal Credit monthly award (UK)
statutory_reference: Welfare Reform Act 2012; UC Regulations 2013 (SI 2013/376)
rates_effective_from: "2025-04-07"
summary: |
  Calculates the monthly UC award for a benefit unit. Covers the standard
  allowance, child element (with two-child limit applied upstream via
  qualifies_for_child_element), disabled-child addition, LCWRA element, carer
  element, housing element, capital tariff income, unearned income deduction,
  and earned income taper with work allowance. Figures use 2025-26 rates.

programme_path: programmes/uksi/2013/376/program.yaml
query_entity: BenefitUnit

out_of_scope:
  - Childcare costs element
  - Benefit cap (separate stratum; not yet encoded)
  - Transitional protection / managed migration run-on
  - Mixed-age couple alternative (SPC gateway)
  - Sanctions, hardship payments, third-party deductions
  - Two-child limit exceptions (multiple births, kinship care, etc.)

inputs:
  period:
    description: The assessment period (a calendar month). UC is assessed monthly.
    dtype: period
    required: true
    example: {start: "2025-05-01", end: "2025-05-31"}
  is_couple:
    description: Whether the claim is for a couple (joint claim).
    dtype: bool
    required: true
  has_housing_costs:
    description: Whether a housing element applies.
    dtype: bool
    required: true
  eligible_housing_costs:
    description: Eligible monthly housing costs before non-dependant deductions, in GBP. Use "0" if has_housing_costs is false.
    dtype: decimal
    required: true
  non_dep_deductions_total:
    description: Total non-dependant deductions applied to the housing element, in GBP per month.
    dtype: decimal
    required: true
  earned_income_monthly:
    description: Combined earned income for the assessment period, in GBP.
    dtype: decimal
    required: true
  unearned_income_monthly:
    description: Combined unearned income (other than tariff income), in GBP. E.g. contributory ESA, widowed parent's allowance.
    dtype: decimal
    required: true
  capital_total:
    description: Total household capital, in GBP. Above 16,000 disentitles; 6,000-16,000 produces tariff income.
    dtype: decimal
    required: true
  adults:
    description: One or two adults in the benefit unit.
    dtype: list
    required: true
    item_schema:
      age_25_or_over: {dtype: bool, description: "True if this adult is 25 or over."}
      has_lcwra: {dtype: bool, description: "Has a Limited Capability for Work-Related Activity determination."}
      is_carer: {dtype: bool, description: "Has regular caring responsibilities qualifying for the carer element."}
  children:
    description: Zero or more children in the benefit unit.
    dtype: list
    required: true
    item_schema:
      qualifies_for_child_element:
        dtype: bool
        description: "True if the two-child limit does not exclude this child."
      disability_level:
        dtype: text
        description: "One of: none, lower, higher."
        options: [none, lower, higher]

outputs:
  standard_allowance: {dtype: decimal, description: "Monthly standard allowance (reg 36)."}
  child_element_total: {dtype: decimal, description: "Sum of child elements including disabled-child additions (reg 24, 24(2))."}
  lcwra_element: {dtype: decimal, description: "LCWRA element, if any (reg 27)."}
  carer_element: {dtype: decimal, description: "Carer element, if any (reg 29)."}
  housing_element: {dtype: decimal, description: "Housing element net of non-dep deductions (reg 25)."}
  max_uc: {dtype: decimal, description: "Maximum amount of UC before income deductions."}
  uc_award: {dtype: decimal, description: "Final monthly award after earned taper, unearned income and tariff deductions; 0 if disentitled on capital."}

examples:
  - name: single_25_plus_no_other_income
    case:
      period: {start: "2025-05-01", end: "2025-05-31"}
      is_couple: false
      has_housing_costs: false
      eligible_housing_costs: "0"
      non_dep_deductions_total: "0"
      earned_income_monthly: "0"
      unearned_income_monthly: "0"
      capital_total: "0"
      adults:
        - {age_25_or_over: true, has_lcwra: false, is_carer: false}
      children: []
    expected_outputs:
      standard_allowance: "400.14"
      uc_award: "400.14"
