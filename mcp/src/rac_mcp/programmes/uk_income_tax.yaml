name: uk_income_tax
title: UK income tax (main rates, 2025-26)
statutory_reference: Income Tax Act 2007
rates_effective_from: "2025-04-06"
summary: |
  Calculates UK income tax for an individual taxpayer over a tax year. Covers
  the personal allowance with high-income taper, the basic/higher/additional
  rate bands, and aggregation across employment, self-employment, pension,
  property and savings income. Does not yet handle Scottish rates, the savings
  starting-rate band, dividend taxation, or gift aid / pension contribution
  adjustments.

programme_path: programmes/ukpga/2007/3/rules.yaml
query_entity: Taxpayer

out_of_scope:
  - Scottish income tax rates
  - Savings starting-rate band and personal savings allowance
  - Dividend income and dividend allowance
  - Gift aid / pension contribution personal-allowance restoration
  - Marriage allowance transfer
  - National Insurance contributions

inputs:
  period:
    description: UK tax year (6 April to 5 April).
    dtype: period
    required: true
    example: {start: "2025-04-06", end: "2026-04-05"}
  employment_income:
    description: PAYE earnings for the tax year, in GBP.
    dtype: decimal
    required: true
  self_employment_income:
    description: Self-employment profits for the tax year, in GBP.
    dtype: decimal
    required: true
  pension_income:
    description: Taxable pension income for the tax year, in GBP.
    dtype: decimal
    required: true
  property_income:
    description: Taxable property income for the tax year, in GBP.
    dtype: decimal
    required: true
  savings_income:
    description: Interest and other savings income for the tax year, in GBP.
    dtype: decimal
    required: true

outputs:
  gross_income: {dtype: decimal, description: "Sum of the five income types."}
  personal_allowance: {dtype: decimal, description: "Personal allowance after high-income taper (£12,570 baseline)."}
  taxable_income: {dtype: decimal, description: "Gross income less personal allowance, floored at zero."}
  income_tax: {dtype: decimal, description: "Tax due across basic, higher and additional bands."}
  net_income: {dtype: decimal, description: "Gross income less income tax."}

examples:
  - name: basic_rate_taxpayer
    case:
      period: {start: "2025-04-06", end: "2026-04-05"}
      employment_income: "30000"
      self_employment_income: "0"
      pension_income: "0"
      property_income: "0"
      savings_income: "0"
    expected_outputs:
      income_tax: "3486"
      net_income: "26514"
