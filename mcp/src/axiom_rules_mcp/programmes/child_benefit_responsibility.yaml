name: child_benefit_responsibility
title: Child benefit — responsible person (SI 1987/1967 reg 15)
statutory_reference: Child Benefit (General) Regulations 1987, regulation 15
summary: |
  For a given child and week, identifies the "responsible person" under the
  reg 15 waterfall. A person is responsible if they are the CB recipient; if
  there is no CB recipient the rule falls back to a sole-claim tie-break, and
  finally to usual residence. Showcases the anti-join / alternative-relational
  operators in the engine.

programme_path: programmes/uksi/1987/1967/regulation/15/rules.yaml
query_entity: Child

out_of_scope:
  - Child benefit rate calculation itself
  - High-income child benefit charge
  - Reg 16 (cases of more than one qualifying person)

inputs:
  period:
    description: The week over which responsibility is being determined.
    dtype: period
    required: true
    example: {start: "2025-05-05", end: "2025-05-11"}
  cb_recipients:
    description: List of person IDs actually receiving child benefit for this child in the period. May be empty.
    dtype: list[text]
    required: true
  cb_claim_count:
    description: Number of live CB claims relating to the child (for the sole-claim tie-break).
    dtype: integer
    required: true
  cb_recipient_id:
    description: Canonical ID of the CB recipient if there is exactly one; else an empty string.
    dtype: text
    required: true
  sole_claimant_id:
    description: Canonical ID of the sole claimant if cb_claim_count is 1; else an empty string.
    dtype: text
    required: true
  usual_resident_id:
    description: Canonical ID of the person with whom the child usually resides.
    dtype: text
    required: true

outputs:
  cb_recipient_count: {dtype: integer, description: "Count of CB recipients for this child."}
  has_cb_recipient: {dtype: judgment, description: "Whether any CB recipient exists (holds / not_holds)."}
  needs_fallback: {dtype: judgment, description: "Whether the rule must fall back past the CB-recipient stratum (anti-join)."}
  sole_claim_fallback: {dtype: judgment, description: "Whether sole-claim tie-break applies."}
  usual_residence_fallback: {dtype: judgment, description: "Whether usual-residence tie-break applies."}
  responsible_person: {dtype: text, description: "ID of the responsible person under reg 15."}
