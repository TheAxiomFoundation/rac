# Pensions Act 2008 s.3 — Automatic enrolment duty on employers.
#
# Section 3(1): a jobholder is in scope if they (a) are aged at least 22,
# (b) have not reached pensionable age, and (c) are paid more than £10,000
# in the relevant pay reference period (pro-rated for PRP ≠ 12 months per
# s.3(6B)).
# Section 3(3)-(4): duty does not apply if the jobholder was already an
# active member of a qualifying scheme on the automatic-enrolment date, or
# ceased to be an active member within the prescribed lookback window due
# to their own action or omission.
#
# Inputs current_age_years, pensionable_age_years, active_member_of_qualifying_scheme,
# and recently_opted_out are caller-computed facts. The lookback window and
# the "pensionable age" test (PA 1995 Sch 4) both sit outside the programme.

units:
  - name: GBP
    kind: currency
    minor_units: 2
  - name: count
    kind: count
  - name: status
    kind: custom
    label: judgment

parameters:
  - name: auto_enrolment_annual_trigger
    unit: GBP
    versions:
      - effective_from: 2024-04-06
        values:
          0: { kind: decimal, value: "10000" }

derived:
  - name: earnings_trigger_for_prp
    entity: Jobholder
    dtype: Decimal
    unit: GBP
    source: "Pensions Act 2008 s.3(6B) pro-rated earnings trigger"
    source_url: "https://www.legislation.gov.uk/ukpga/2008/30/section/3"
    semantics: scalar
    expr:
      kind: div
      left:
        kind: mul
        left:
          kind: parameter_lookup
          parameter: auto_enrolment_annual_trigger
          index: { kind: literal, value: { kind: integer, value: 0 } }
        right:
          kind: input
          name: prp_months
      right:
        kind: literal
        value: { kind: decimal, value: "12" }

  - name: age_at_least_22
    entity: Jobholder
    dtype: Judgment
    unit: status
    source: "Pensions Act 2008 s.3(1)(a)"
    source_url: "https://www.legislation.gov.uk/ukpga/2008/30/section/3"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: input, name: current_age_years }
      op: gte
      right: { kind: literal, value: { kind: integer, value: 22 } }

  - name: below_pensionable_age
    entity: Jobholder
    dtype: Judgment
    unit: status
    source: "Pensions Act 2008 s.3(1)(b)"
    source_url: "https://www.legislation.gov.uk/ukpga/2008/30/section/3"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: input, name: current_age_years }
      op: lt
      right: { kind: input, name: pensionable_age_years }

  - name: earnings_above_trigger
    entity: Jobholder
    dtype: Judgment
    unit: status
    source: "Pensions Act 2008 s.3(1)(c)"
    source_url: "https://www.legislation.gov.uk/ukpga/2008/30/section/3"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: input, name: earnings_this_prp }
      op: gt
      right:
        kind: derived
        name: earnings_trigger_for_prp

  - name: not_already_active_member
    entity: Jobholder
    dtype: Judgment
    unit: status
    source: "Pensions Act 2008 s.3(3)"
    source_url: "https://www.legislation.gov.uk/ukpga/2008/30/section/3"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: input, name: active_member_of_qualifying_scheme }
      op: eq
      right: { kind: literal, value: { kind: bool, value: false } }

  - name: not_recently_opted_out
    entity: Jobholder
    dtype: Judgment
    unit: status
    source: "Pensions Act 2008 s.3(4) lookback (pre-applied by caller)"
    source_url: "https://www.legislation.gov.uk/ukpga/2008/30/section/3"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: input, name: recently_opted_out }
      op: eq
      right: { kind: literal, value: { kind: bool, value: false } }

  - name: employer_enrolment_duty
    entity: Jobholder
    dtype: Judgment
    unit: status
    source: "Pensions Act 2008 s.3(1)-(4) combined"
    source_url: "https://www.legislation.gov.uk/ukpga/2008/30/section/3"
    semantics: judgment
    expr:
      kind: and
      items:
        - kind: derived
          name: age_at_least_22
        - kind: derived
          name: below_pensionable_age
        - kind: derived
          name: earnings_above_trigger
        - kind: derived
          name: not_already_active_member
        - kind: derived
          name: not_recently_opted_out
