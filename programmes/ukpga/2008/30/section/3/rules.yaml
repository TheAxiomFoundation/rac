format: rulespec/v1
module:
  summary: |-
    Pensions Act 2008 s.3 — employer automatic-enrolment duty.

    s.3(1): a jobholder is in scope if (a) aged 22+, (b) below pensionable
    age, and (c) paid more than £10,000 in the relevant pay reference period
    (pro-rated per s.3(6B)).
    s.3(3)-(4): no duty if already an active qualifying-scheme member, or if
    the jobholder recently opted out within the prescribed lookback.

    `current_age_years`, `pensionable_age_years`,
    `active_member_of_qualifying_scheme`, `recently_opted_out` and
    `earnings_this_prp` are caller-supplied facts. The lookback window and
    the PA 1995 Sch 4 pensionable-age test sit outside this programme.
rules:
  - name: auto_enrolment_annual_trigger
    kind: parameter
    dtype: Money
    unit: GBP
    versions:
      - effective_from: '2024-04-06'
        formula: '10000'
  - name: earnings_trigger_for_prp
    kind: derived
    entity: Jobholder
    dtype: Money
    period: Day
    unit: GBP
    source: Pensions Act 2008 s.3(6B)
    source_url: https://www.legislation.gov.uk/ukpga/2008/30/section/3
    versions:
      - effective_from: '2024-04-06'
        formula: auto_enrolment_annual_trigger * prp_months / 12
  - name: age_at_least_22
    kind: derived
    entity: Jobholder
    dtype: Judgment
    period: Day
    source: Pensions Act 2008 s.3(1)(a)
    versions:
      - effective_from: '2024-04-06'
        formula: current_age_years >= 22
  - name: below_pensionable_age
    kind: derived
    entity: Jobholder
    dtype: Judgment
    period: Day
    source: Pensions Act 2008 s.3(1)(b)
    versions:
      - effective_from: '2024-04-06'
        formula: current_age_years < pensionable_age_years
  - name: earnings_above_trigger
    kind: derived
    entity: Jobholder
    dtype: Judgment
    period: Day
    source: Pensions Act 2008 s.3(1)(c)
    versions:
      - effective_from: '2024-04-06'
        formula: earnings_this_prp > earnings_trigger_for_prp
  - name: not_already_active_member
    kind: derived
    entity: Jobholder
    dtype: Judgment
    period: Day
    source: Pensions Act 2008 s.3(3)
    versions:
      - effective_from: '2024-04-06'
        formula: not active_member_of_qualifying_scheme
  - name: not_recently_opted_out
    kind: derived
    entity: Jobholder
    dtype: Judgment
    period: Day
    source: Pensions Act 2008 s.3(4)
    versions:
      - effective_from: '2024-04-06'
        formula: not recently_opted_out
  - name: employer_enrolment_duty
    kind: derived
    entity: Jobholder
    dtype: Judgment
    period: Day
    source: Pensions Act 2008 s.3 combined
    source_url: https://www.legislation.gov.uk/ukpga/2008/30/section/3
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          age_at_least_22
          and below_pensionable_age
          and earnings_above_trigger
          and not_already_active_member
          and not_recently_opted_out
