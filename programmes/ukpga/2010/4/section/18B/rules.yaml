format: rulespec/v1
module:
  summary: |-
    Corporation Tax Act 2010 s.18B — marginal relief for companies without
    ring-fence profits.

    Marginal relief applies where augmented profits fall between the lower
    and upper limits, pro-rated by accounting-period length (`ap_year_fraction`,
    a caller input so "proportionately" is not baked into the DSL) and by
    1 + the number of associated companies.

      marginal_relief = F × (U_eff − A) × (N / A)

    F is the standard fraction (3/200 = 0.015). Main CT rate of 25% is
    applied to N outside this programme; marginal relief reduces gross CT.
rules:
  - name: ct_lower_limit
    kind: parameter
    dtype: Money
    unit: GBP
    versions:
      - effective_from: '2023-04-01'
        formula: '50000'
  - name: ct_upper_limit
    kind: parameter
    dtype: Money
    unit: GBP
    versions:
      - effective_from: '2023-04-01'
        formula: '250000'
  - name: ct_marginal_relief_fraction
    kind: parameter
    dtype: Rate
    versions:
      - effective_from: '2023-04-01'
        formula: '0.015'
  - name: ct_main_rate
    kind: parameter
    dtype: Rate
    versions:
      - effective_from: '2023-04-01'
        formula: '0.25'
  - name: num_associates
    kind: derived
    entity: Company
    dtype: Integer
    period: Year
    source: CTA 2010 s.18E associated-company count
    source_url: https://www.legislation.gov.uk/ukpga/2010/4/section/18E
    versions:
      - effective_from: '2023-04-01'
        formula: len(associate_of)
  - name: associates_divisor
    kind: derived
    entity: Company
    dtype: Integer
    period: Year
    source: CTA 2010 s.18E
    versions:
      - effective_from: '2023-04-01'
        formula: num_associates + 1
  - name: lower_limit_effective
    kind: derived
    entity: Company
    dtype: Money
    period: Year
    unit: GBP
    source: CTA 2010 s.18B — lower limit pro-rated
    source_url: https://www.legislation.gov.uk/ukpga/2010/4/section/18B
    versions:
      - effective_from: '2023-04-01'
        formula: ct_lower_limit * ap_year_fraction / associates_divisor
  - name: upper_limit_effective
    kind: derived
    entity: Company
    dtype: Money
    period: Year
    unit: GBP
    source: CTA 2010 s.18B — upper limit pro-rated
    source_url: https://www.legislation.gov.uk/ukpga/2010/4/section/18B
    versions:
      - effective_from: '2023-04-01'
        formula: ct_upper_limit * ap_year_fraction / associates_divisor
  - name: no_ring_fence_profits
    kind: derived
    entity: Company
    dtype: Judgment
    period: Year
    source: CTA 2010 s.18B(1)(d)
    versions:
      - effective_from: '2023-04-01'
        formula: ring_fence_profits == 0
  - name: within_marginal_band
    kind: derived
    entity: Company
    dtype: Judgment
    period: Year
    source: CTA 2010 s.18B(1)(c)
    versions:
      - effective_from: '2023-04-01'
        formula: |-
          augmented_profits > lower_limit_effective
          and augmented_profits <= upper_limit_effective
  - name: eligible_for_marginal_relief
    kind: derived
    entity: Company
    dtype: Judgment
    period: Year
    source: CTA 2010 s.18B(1)
    source_url: https://www.legislation.gov.uk/ukpga/2010/4/section/18B
    versions:
      - effective_from: '2023-04-01'
        formula: |-
          uk_resident
          and not close_investment_holding
          and within_marginal_band
          and no_ring_fence_profits
  - name: marginal_relief
    kind: derived
    entity: Company
    dtype: Money
    period: Year
    unit: GBP
    source: CTA 2010 s.18B(2)
    source_url: https://www.legislation.gov.uk/ukpga/2010/4/section/18B
    versions:
      - effective_from: '2023-04-01'
        formula: |-
          if eligible_for_marginal_relief:
              ct_marginal_relief_fraction
              * (upper_limit_effective - augmented_profits)
              * (taxable_total_profits / max(augmented_profits, 1))
          else: 0
  - name: gross_corporation_tax
    kind: derived
    entity: Company
    dtype: Money
    period: Year
    unit: GBP
    source: CTA 2010 s.3(1)
    source_url: https://www.legislation.gov.uk/ukpga/2010/4/section/3
    versions:
      - effective_from: '2023-04-01'
        formula: taxable_total_profits * ct_main_rate
  - name: corporation_tax_after_relief
    kind: derived
    entity: Company
    dtype: Money
    period: Year
    unit: GBP
    source: CTA 2010 s.18B(2) applied to s.3 charge
    source_url: https://www.legislation.gov.uk/ukpga/2010/4/section/18B
    versions:
      - effective_from: '2023-04-01'
        formula: max(0, gross_corporation_tax - marginal_relief)
