cases:
  - name: adult_compliant
    worker_id: worker-1
    period:
      period_kind: month
      start: 2025-05-01
      end: 2025-05-31
    is_worker: true
    works_in_uk: true
    above_compulsory_school_age: true
    current_age_years: 35
    is_apprentice_first_year: false
    remuneration_in_prp: "2100"
    hours_worked_in_prp: "160"
    expected:
      qualifies_for_nmw: holds
      age_band_number: 2
      rate_owed: "12.21"
      # 2100 / 160 = 13.125
      effective_hourly: "13.125"
      is_compliant: holds
      shortfall_total: "0"

  - name: eighteen_year_old_just_below_rate
    worker_id: worker-2
    period:
      period_kind: month
      start: 2025-05-01
      end: 2025-05-31
    is_worker: true
    works_in_uk: true
    above_compulsory_school_age: true
    current_age_years: 19
    is_apprentice_first_year: false
    # 160 hours at £9.50 = £1520; owed £10/hr so shortfall £80
    remuneration_in_prp: "1520"
    hours_worked_in_prp: "160"
    expected:
      age_band_number: 1
      rate_owed: "10.00"
      effective_hourly: "9.50"
      is_compliant: not_holds
      # (10 - 9.5) * 160 = 80
      shortfall_total: "80"

