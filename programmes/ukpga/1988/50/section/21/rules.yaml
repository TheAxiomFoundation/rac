# Housing Act 1988 s.21 — validity of a notice seeking possession of an
# assured shorthold tenancy (post-Deregulation Act 2015 regime).
#
# This programme is deliberately different in flavour from every other
# encoding in this repo. Its top-level output is a **statutory conclusion**
# (`section_21_notice_valid`: holds / not_holds), not a currency amount.
# There is no arithmetic on the question being asked — only a cascade of
# legal judgments, absence conditions, and named time windows, drawn
# together from several Acts that must agree for the notice to be valid.
#
# The point of encoding s.21 is to show that the RAC DSL extends naturally
# beyond the dated-formula world where the prior surface was comfortable.
# A section 21 notice is binary — either the tenant has to leave or they
# don't — and that binary depends on things the old formula-first surface
# had no natural way to express:
#
#   * "Deposit was not protected within 30 days"  — a named legal period
#     inside another Act (Housing Act 2004 s.213(3)), tested with
#     days_between and a comparison against 30.
#   * "How-to-Rent guide was served"              — absence condition on a
#     procedural act (Deregulation Act 2015 s.39, SI 2015/1646 reg 3).
#   * "Landlord is not licensed"                  — anti-condition on a
#     statutory status (Housing Act 2004 Part 2 / Part 3).
#   * "A council enforcement notice was served on
#     the landlord within 6 months before the
#     s.21 notice"                                — a filtered count over a
#     related-entity relation, with a date-window where-clause
#     (Deregulation Act 2015 s.33(2) retaliatory-eviction bar).
#   * "Notice served within the first four months
#     of the tenancy"                             — a named legal period
#     within s.21 itself (s.21(4B)).
#
# Every derived output below cites its source provision; the final
# `section_21_notice_valid` judgment composes these with `and` / `not`.
# Out of scope: ground-based mandatory/discretionary possession under
# s.8 and Schedule 2 (different regime), fixed-term vs statutory periodic
# distinctions beyond s.21(4B), possession at the end of a fixed term
# where s.21(1) vs s.21(4) applies (we assume post-2015 Form 6A notice
# and a statutory periodic tenancy beyond its fixed term).

units:
  - name: count
    kind: count
  - name: status
    kind: custom
    label: judgment

relations:
  # A council-served enforcement notice (improvement / prohibition / hazard
  # awareness) against the landlord, relevant for the Deregulation Act 2015
  # s.33 retaliatory-eviction bar. Each notice is its own entity with a
  # served_on date; the bar fires if any such notice falls within the
  # 6 months before the s.21 notice is served.
  - name: council_notice_of_tenancy
    arity: 2  # slot 0 = CouncilNotice, slot 1 = Tenancy

parameters:
  - name: deposit_protection_window_days
    unit: count
    versions:
      - effective_from: 2007-04-06
        values:
          0: { kind: integer, value: 30 }

  - name: earliest_notice_tenancy_age_days
    unit: count
    versions:
      - effective_from: 2015-10-01
        values:
          0: { kind: integer, value: 120 }  # 4 months, per HA 1988 s.21(4B)

derived:
  # ---------------------------------------------------------------------------
  # Tenancy-form gate (HA 1988 s.19A, Schedule 2A): s.21 only applies where
  # there is an assured shorthold tenancy to begin with.
  # ---------------------------------------------------------------------------

  - name: tenancy_is_assured_shorthold
    entity: Tenancy
    dtype: judgment
    unit: status
    source: "Housing Act 1988 s.19A + Sch 2A"
    source_url: "https://www.legislation.gov.uk/ukpga/1988/50/section/19A"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: input, name: is_assured_shorthold }
      op: eq
      right: { kind: literal, value: { kind: bool, value: true } }

  # ---------------------------------------------------------------------------
  # Deposit protection (HA 2004 s.213–215). If a deposit was taken it must
  # have been placed in an authorised scheme within 30 days of receipt, and
  # the prescribed information must have been served within the same 30-day
  # window. If either leg fails the landlord cannot serve s.21 until the
  # deposit is returned in full (HA 2004 s.215A) — we surface the failure
  # directly, treating "return the deposit first" as a separate remedy the
  # landlord might or might not have taken.
  # ---------------------------------------------------------------------------

  - name: days_from_deposit_receipt_to_protection
    entity: Tenancy
    dtype: integer
    unit: count
    source: "Housing Act 2004 s.213(3) — 30-day protection window"
    source_url: "https://www.legislation.gov.uk/ukpga/2004/34/section/213"
    semantics: scalar
    expr:
      kind: days_between
      from: { kind: input, name: deposit_received_date }
      to: { kind: input, name: deposit_protected_date }

  - name: days_from_deposit_receipt_to_info
    entity: Tenancy
    dtype: integer
    unit: count
    source: "Housing Act 2004 s.213(6) — prescribed-information 30-day window"
    source_url: "https://www.legislation.gov.uk/ukpga/2004/34/section/213"
    semantics: scalar
    expr:
      kind: days_between
      from: { kind: input, name: deposit_received_date }
      to: { kind: input, name: prescribed_info_given_date }

  - name: deposit_protected_in_time
    entity: Tenancy
    dtype: judgment
    unit: status
    source: "Housing Act 2004 s.213(3)"
    source_url: "https://www.legislation.gov.uk/ukpga/2004/34/section/213"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: derived, name: days_from_deposit_receipt_to_protection }
      op: lte
      right:
        kind: parameter_lookup
        parameter: deposit_protection_window_days
        index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: prescribed_info_in_time
    entity: Tenancy
    dtype: judgment
    unit: status
    source: "Housing Act 2004 s.213(6)"
    source_url: "https://www.legislation.gov.uk/ukpga/2004/34/section/213"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: derived, name: days_from_deposit_receipt_to_info }
      op: lte
      right:
        kind: parameter_lookup
        parameter: deposit_protection_window_days
        index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: no_deposit_taken
    entity: Tenancy
    dtype: judgment
    unit: status
    source: "Housing Act 2004 s.213(1) — scheme duties only bite on a 'tenancy deposit'"
    source_url: "https://www.legislation.gov.uk/ukpga/2004/34/section/213"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: input, name: deposit_taken }
      op: eq
      right: { kind: literal, value: { kind: bool, value: false } }

  - name: deposit_requirements_met
    entity: Tenancy
    dtype: judgment
    unit: status
    source: "Housing Act 2004 s.215(1)(a) + s.215(2) — s.21 barred if scheme duties unmet"
    source_url: "https://www.legislation.gov.uk/ukpga/2004/34/section/215"
    semantics: judgment
    expr:
      kind: or
      items:
        - kind: derived
          name: no_deposit_taken
        - kind: and
          items:
            - kind: derived
              name: deposit_protected_in_time
            - kind: derived
              name: prescribed_info_in_time

  # ---------------------------------------------------------------------------
  # Prescribed-documents gate (Deregulation Act 2015 s.38 + s.39;
  # Assured Shorthold Tenancy Notices and Prescribed Requirements (England)
  # Regulations 2015, SI 2015/1646).
  # ---------------------------------------------------------------------------

  - name: epc_requirement_met
    entity: Tenancy
    dtype: judgment
    unit: status
    source: "Deregulation Act 2015 s.38(1) + SI 2015/1646 reg 2(1)(b)"
    source_url: "https://www.legislation.gov.uk/uksi/2015/1646/regulation/2"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: input, name: epc_given_before_tenancy }
      op: eq
      right: { kind: literal, value: { kind: bool, value: true } }

  - name: gas_safety_requirement_met
    entity: Tenancy
    dtype: judgment
    unit: status
    source: "Gas Safety (Installation and Use) Regulations 1998 reg 36(6); SI 2015/1646 reg 2(1)(a)"
    source_url: "https://www.legislation.gov.uk/uksi/2015/1646/regulation/2"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: input, name: gas_safety_given_before_occupation }
      op: eq
      right: { kind: literal, value: { kind: bool, value: true } }

  - name: how_to_rent_requirement_met
    entity: Tenancy
    dtype: judgment
    unit: status
    source: "Deregulation Act 2015 s.39 + SI 2015/1646 reg 3"
    source_url: "https://www.legislation.gov.uk/uksi/2015/1646/regulation/3"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: input, name: how_to_rent_guide_given }
      op: eq
      right: { kind: literal, value: { kind: bool, value: true } }

  # ---------------------------------------------------------------------------
  # Licensing gate (HA 2004 Part 2 mandatory HMO + Part 3 selective;
  # Deregulation Act 2015 s.41 imports the licensing bar into s.21).
  # ---------------------------------------------------------------------------

  - name: licensing_not_required
    entity: Tenancy
    dtype: judgment
    unit: status
    source: "Housing Act 2004 Part 2 / Part 3 — licensing only bites if property is within scope"
    source_url: "https://www.legislation.gov.uk/ukpga/2004/34/part/2"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: input, name: property_requires_licence }
      op: eq
      right: { kind: literal, value: { kind: bool, value: false } }

  - name: landlord_holds_licence
    entity: Tenancy
    dtype: judgment
    unit: status
    source: "Housing Act 2004 s.61 / s.85"
    source_url: "https://www.legislation.gov.uk/ukpga/2004/34/section/61"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: input, name: landlord_has_licence }
      op: eq
      right: { kind: literal, value: { kind: bool, value: true } }

  - name: licensing_requirement_met
    entity: Tenancy
    dtype: judgment
    unit: status
    source: "Deregulation Act 2015 s.41 — s.21 unavailable where licensing duties unmet"
    source_url: "https://www.legislation.gov.uk/ukpga/2015/20/section/41"
    semantics: judgment
    expr:
      kind: or
      items:
        - kind: derived
          name: licensing_not_required
        - kind: derived
          name: landlord_holds_licence

  # ---------------------------------------------------------------------------
  # Retaliatory-eviction bar (Deregulation Act 2015 s.33). The bar fires if
  # a local-authority enforcement notice has been served on the landlord
  # within the 6 months before the s.21 notice. We model each council
  # notice as a related entity carrying `days_before_s21_notice` (a caller-
  # computed relative day count); the filtered `count_related` selects
  # notices in the 0–180 day lookback window. The bar applying is *the
  # absence of a qualifying notice* (count == 0) — a pure absence condition
  # of the kind the old formula-first surface had no natural way to express.
  # ---------------------------------------------------------------------------

  - name: qualifying_council_notices
    entity: Tenancy
    dtype: integer
    unit: count
    source: "Deregulation Act 2015 s.33(1) + s.33(2)(a) — relevant local-authority notice in the 6-month window"
    source_url: "https://www.legislation.gov.uk/ukpga/2015/20/section/33"
    semantics: scalar
    expr:
      kind: count_related
      relation: council_notice_of_tenancy
      current_slot: 1
      related_slot: 0
      where:
        kind: and
        items:
          - kind: comparison
            left: { kind: input, name: days_before_s21_notice }
            op: gte
            right: { kind: literal, value: { kind: integer, value: 0 } }
          - kind: comparison
            left: { kind: input, name: days_before_s21_notice }
            op: lte
            right: { kind: literal, value: { kind: integer, value: 180 } }

  - name: no_retaliation_bar
    entity: Tenancy
    dtype: judgment
    unit: status
    source: "Deregulation Act 2015 s.33 — absence of a qualifying council notice in the window"
    source_url: "https://www.legislation.gov.uk/ukpga/2015/20/section/33"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: derived, name: qualifying_council_notices }
      op: eq
      right: { kind: literal, value: { kind: integer, value: 0 } }

  # ---------------------------------------------------------------------------
  # s.21(4B) — notice cannot be given within the first four months of the
  # tenancy.
  # ---------------------------------------------------------------------------

  - name: tenancy_age_days_at_notice
    entity: Tenancy
    dtype: integer
    unit: count
    source: "Housing Act 1988 s.21(4B)"
    source_url: "https://www.legislation.gov.uk/ukpga/1988/50/section/21"
    semantics: scalar
    expr:
      kind: days_between
      from: { kind: input, name: tenancy_start_date }
      to: { kind: input, name: notice_served_date }

  - name: not_served_too_early
    entity: Tenancy
    dtype: judgment
    unit: status
    source: "Housing Act 1988 s.21(4B) — no notice in first four months"
    source_url: "https://www.legislation.gov.uk/ukpga/1988/50/section/21"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: derived, name: tenancy_age_days_at_notice }
      op: gte
      right:
        kind: parameter_lookup
        parameter: earliest_notice_tenancy_age_days
        index: { kind: literal, value: { kind: integer, value: 0 } }

  # ---------------------------------------------------------------------------
  # The statutory conclusion: a s.21 notice is valid iff every gate above
  # holds. This is the whole reason to encode this section — it is the
  # judgment the court would reach on the notice, not a monetary amount.
  # ---------------------------------------------------------------------------

  - name: section_21_notice_valid
    entity: Tenancy
    dtype: judgment
    unit: status
    source: "Housing Act 1988 s.21 as modified by Deregulation Act 2015 Part 3 Ch 1"
    source_url: "https://www.legislation.gov.uk/ukpga/1988/50/section/21"
    semantics: judgment
    expr:
      kind: and
      items:
        - kind: derived
          name: tenancy_is_assured_shorthold
        - kind: derived
          name: deposit_requirements_met
        - kind: derived
          name: epc_requirement_met
        - kind: derived
          name: gas_safety_requirement_met
        - kind: derived
          name: how_to_rent_requirement_met
        - kind: derived
          name: licensing_requirement_met
        - kind: derived
          name: no_retaliation_bar
        - kind: derived
          name: not_served_too_early
