  - name: retaliation_bar_council_notice_within_window
    tenancy_id: tenancy-9
    period: { period_kind: custom, name: evaluation, start: 2024-01-01, end: 2024-12-31 }
    is_assured_shorthold: true
    tenancy_start_date: 2024-01-15
    notice_served_date: 2024-09-01
    deposit_taken: true
    deposit_received_date: 2024-01-15
    deposit_protected_date: 2024-02-01
    prescribed_info_given_date: 2024-02-01
    epc_given_before_tenancy: true
    gas_safety_given_before_occupation: true
    how_to_rent_guide_given: true
    property_requires_licence: false
    landlord_has_licence: false
    council_notices:
      - id: cn-1
        days_before_s21_notice: 45      # within the 0-180 window
    expected:
      qualifying_council_notices: 1
      no_retaliation_bar: not_holds
      section_21_notice_valid: not_holds

  - name: council_notice_outside_window_does_not_bar
    tenancy_id: tenancy-10
    period: { period_kind: custom, name: evaluation, start: 2024-01-01, end: 2024-12-31 }
    is_assured_shorthold: true
    tenancy_start_date: 2023-01-15
    notice_served_date: 2024-09-01
    deposit_taken: true
    deposit_received_date: 2023-01-15
    deposit_protected_date: 2023-02-01
    prescribed_info_given_date: 2023-02-01
    epc_given_before_tenancy: true
    gas_safety_given_before_occupation: true
    how_to_rent_guide_given: true
    property_requires_licence: false
    landlord_has_licence: false
    council_notices:
      - id: cn-2
        days_before_s21_notice: 400     # outside the 0-180 window
    expected:
      qualifying_council_notices: 0
      no_retaliation_bar: holds
      section_21_notice_valid: holds

  - name: no_deposit_no_problem
    tenancy_id: tenancy-11
    period: { period_kind: custom, name: evaluation, start: 2024-01-01, end: 2024-12-31 }
    is_assured_shorthold: true
    tenancy_start_date: 2024-01-15
    notice_served_date: 2024-09-01
    deposit_taken: false
    deposit_received_date: 2024-01-15   # sentinel; unused when no_deposit_taken holds
    deposit_protected_date: 2024-01-15
    prescribed_info_given_date: 2024-01-15
    epc_given_before_tenancy: true
    gas_safety_given_before_occupation: true
    how_to_rent_guide_given: true
    property_requires_licence: false
    landlord_has_licence: false
    council_notices: []
    expected:
      no_deposit_taken: holds
      deposit_requirements_met: holds
      section_21_notice_valid: holds
