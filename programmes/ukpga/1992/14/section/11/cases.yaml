cases:
  - name: single_adult_occupant
    dwelling_id: dwelling-1
    period:
      period_kind: tax_year
      start: 2024-04-01
      end: 2025-03-31
    empty_home_override_applies: false
    residents:
      - id: person-1
        is_disregarded: false
    expected:
      num_non_disregarded_residents: 1
      single_occupier_discount_applies: holds
      empty_home_discount_applies: not_holds
      discount_fraction: "0.25"

  - name: two_adults_no_discount
    dwelling_id: dwelling-2
    period:
      period_kind: tax_year
      start: 2024-04-01
      end: 2025-03-31
    empty_home_override_applies: false
    residents:
      - id: person-2a
        is_disregarded: false
      - id: person-2b
        is_disregarded: false
    expected:
      num_non_disregarded_residents: 2
      single_occupier_discount_applies: not_holds
      empty_home_discount_applies: not_holds
      discount_fraction: "0"

  - name: student_plus_adult_counts_as_single_occupant
    dwelling_id: dwelling-3
    period:
      period_kind: tax_year
      start: 2024-04-01
      end: 2025-03-31
    empty_home_override_applies: false
    residents:
      - id: person-3a
        is_disregarded: false
      - id: person-3b
        is_disregarded: true
    expected:
      num_non_disregarded_residents: 1
      single_occupier_discount_applies: holds
      discount_fraction: "0.25"

  - name: all_students_empty_home_rate
    dwelling_id: dwelling-4
    period:
      period_kind: tax_year
      start: 2024-04-01
      end: 2025-03-31
    empty_home_override_applies: false
    residents:
      - id: person-4a
        is_disregarded: true
      - id: person-4b
        is_disregarded: true
    expected:
      num_non_disregarded_residents: 0
      single_occupier_discount_applies: not_holds
      empty_home_discount_applies: holds
      discount_fraction: "0.50"

  - name: no_residents_empty_home_rate
    dwelling_id: dwelling-5
    period:
      period_kind: tax_year
      start: 2024-04-01
      end: 2025-03-31
    empty_home_override_applies: false
    residents: []
    expected:
      num_non_disregarded_residents: 0
      empty_home_discount_applies: holds
      discount_fraction: "0.50"

  - name: empty_home_with_override_no_discount
    dwelling_id: dwelling-6
    period:
      period_kind: tax_year
      start: 2024-04-01
      end: 2025-03-31
    empty_home_override_applies: true
    residents: []
    expected:
      num_non_disregarded_residents: 0
      empty_home_discount_applies: not_holds
      discount_fraction: "0"
