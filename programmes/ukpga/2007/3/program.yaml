# Income Tax Act 2007 — UK income tax for the 2025-26 tax year.
#
# Structured around the seven-step calculation skeleton of ITA 2007 s.23:
#   step 1 — total income
#   step 2 — reliefs deducted → net income
#   step 3 — allowances deducted → taxable income (split NSND / savings / dividend)
#   step 4 — rate applied to each income slice at its band position
#   step 5 — tax-at-rate amounts summed
#   step 6 — tax reducers subtracted
#   step 7 — HICBC and Gift Aid recovery added
#
# Covers: five NSND income components (employment, self-employment, pension,
# property, trading), trading / property allowances, savings income (split out
# with personal savings allowance and the starting rate for savings), UK and
# foreign dividend income (with the dividend allowance), blind person's
# allowance, marriage allowance (inbound reducer and outbound transfer),
# personal allowance with the £100,000 taper, rUK and Scottish NSND rate
# ladders, Gift Aid and relief-at-source pension band extensions, marriage /
# EIS / SEIS / VCT tax reducers, HICBC and Gift Aid recovery.
#
# Optional inputs are declared with `input_or_else` so callers only need to
# supply what a given case exercises. Every amount is per-tax-year; intervals
# on the input records must cover the tax year being evaluated.
#
# Out of scope (flagged in docs/uk-income-tax-scope.md):
#   * top-slicing relief on chargeable event gains (needs bounded-loop op)
#   * cross-period loss reliefs (needs cross-year state; loss_reliefs is an
#     input here)
#   * married couple's allowance (pre-1935 cohort; tiny)
#   * rent-a-room relief election (caller pre-applies if so electing)
#   * remittance basis / FIG regime for non-domiciled residents

units:
  - name: GBP
    kind: currency
    minor_units: 2
  - name: ratio
    kind: ratio
  - name: count
    kind: count

parameters:
  # Rates and thresholds. `effective_from` = first day of the 2025-26 tax year.

  - name: uk_personal_allowance
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "12570" } }

  - name: uk_pa_taper_threshold
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "100000" } }

  - name: uk_blind_persons_allowance
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "3130" } }

  - name: uk_marriage_allowance_transfer
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "1260" } }

  - name: uk_marriage_allowance_reducer
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "252" } }

  - name: uk_trading_allowance
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "1000" } }

  - name: uk_property_allowance
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "1000" } }

  - name: uk_starting_rate_for_savings_band
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "5000" } }

  - name: uk_psa_basic
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "1000" } }

  - name: uk_psa_higher
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "500" } }

  - name: uk_dividend_allowance
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "500" } }

  # rUK / Welsh taxable-income bands. Defined in terms of taxable income
  # above the personal allowance.
  - name: uk_basic_rate_band
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "37700" } }

  - name: uk_additional_rate_threshold
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "125140" } }

  - name: uk_basic_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.20" } }

  - name: uk_higher_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.40" } }

  - name: uk_additional_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.45" } }

  # Scottish bands per the 2025-26 Scottish Rate Resolution. Bands expressed as
  # the cumulative upper bound of taxable NSND income for each band; the band
  # amount for band k is then `min(nsnd, upper_k) - min(nsnd, upper_{k-1})`.
  - name: uk_scottish_starter_limit
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "2306" } }

  - name: uk_scottish_basic_limit
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "13991" } }

  - name: uk_scottish_intermediate_limit
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "31092" } }

  - name: uk_scottish_higher_limit
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "62430" } }

  - name: uk_scottish_advanced_limit
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "125140" } }

  - name: uk_scottish_starter_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.19" } }

  - name: uk_scottish_basic_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.20" } }

  - name: uk_scottish_intermediate_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.21" } }

  - name: uk_scottish_higher_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.42" } }

  - name: uk_scottish_advanced_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.45" } }

  - name: uk_scottish_top_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.48" } }

  # Dividend rates apply to all UK residents (rUK, Welsh, Scottish alike) at
  # the rUK band positions.
  - name: uk_dividend_basic_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.0875" } }

  - name: uk_dividend_higher_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.3375" } }

  - name: uk_dividend_additional_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.3935" } }

  # HICBC (ITEPA 2003 s.681B): charge 1% per £200 of adjusted net income over
  # £60,000, capped at 100% at £80,000 (from 6 April 2024).
  - name: uk_hicbc_threshold
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "60000" } }

  - name: uk_hicbc_step_amount
    unit: GBP
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "200" } }

  - name: uk_hicbc_cap_percent
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "100" } }

  - name: uk_eis_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.30" } }

  - name: uk_seis_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.50" } }

  - name: uk_vct_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.30" } }

  # Gross-up factor for Gift Aid and relief-at-source pension contributions:
  # a £100 net donation counts as £125 of pre-basic-rate-tax income, so
  # grossed-up = net / 0.8.
  - name: uk_gift_aid_grossup_divisor
    unit: ratio
    versions:
      - effective_from: 2025-04-06
        values: { 0: { kind: decimal, value: "0.8" } }

derived:

  # ----- Step 1 — total income ----------------------------------------------

  # Trading and property income net of the £1,000 allowances. ITTOIA 2005
  # s.783A (trading) and s.783B (property) permit deducting £1,000 in lieu of
  # actual expenses; this programme models the allowance route, leaving the
  # alternative actual-expenses route to the caller's pre-computation.
  - name: trading_income_after_allowance
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITTOIA 2005 s.783A
    source_url: https://www.legislation.gov.uk/ukpga/2005/5/section/783A
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: input_or_else
            name: trading_income
            default: { kind: decimal, value: "0" }
          right:
            kind: parameter_lookup
            parameter: uk_trading_allowance
            index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: property_income_after_allowance
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITTOIA 2005 s.783B
    source_url: https://www.legislation.gov.uk/ukpga/2005/5/section/783B
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: input_or_else
            name: property_income
            default: { kind: decimal, value: "0" }
          right:
            kind: parameter_lookup
            parameter: uk_property_allowance
            index: { kind: literal, value: { kind: integer, value: 0 } }

  # Non-savings non-dividend income — employment, self-employment, pensions,
  # property (after allowance), trading (after allowance). Statutorily, the
  # "savings_income" channel below models bank / building society interest,
  # gilts and purchased life annuities; it's taxed on the savings rate ladder
  # rather than the NSND ladder.
  - name: nsnd_income
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.16
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/16
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: input_or_else
          name: employment_income
          default: { kind: decimal, value: "0" }
        - kind: input_or_else
          name: self_employment_income
          default: { kind: decimal, value: "0" }
        - kind: input_or_else
          name: pension_income
          default: { kind: decimal, value: "0" }
        - kind: derived
          name: property_income_after_allowance
        - kind: derived
          name: trading_income_after_allowance

  - name: savings_income
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.18
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/18
    semantics: scalar
    expr:
      kind: input_or_else
      name: savings_income
      default: { kind: decimal, value: "0" }

  - name: dividend_income
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.19
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/19
    semantics: scalar
    expr:
      kind: add
      items:
        - { kind: input_or_else, name: uk_dividends, default: { kind: decimal, value: "0" } }
        - { kind: input_or_else, name: foreign_dividends, default: { kind: decimal, value: "0" } }

  # Total income (Step 1). Preserves the name `gross_income` for callers that
  # pre-date the three-channel split.
  - name: gross_income
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.23 step 1
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/23
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: derived
          name: nsnd_income
        - kind: derived
          name: savings_income
        - kind: derived
          name: dividend_income

  # ----- Step 2 — reliefs ----------------------------------------------------

  # One input channel per relief would be ideal, but the prototype folds them
  # into a single `reliefs_total` input for now. That covers loss carry-backs
  # and carry-forwards (which need cross-period state anyway), qualifying loan
  # interest (ITA s.383), share-loss relief (ITA s.131), and gifts of shares
  # and land to charity (ITA s.431). All apply at Step 2.
  - name: reliefs_total
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.23 step 2
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/23
    semantics: scalar
    expr:
      kind: input_or_else
      name: reliefs_total
      default: { kind: decimal, value: "0" }

  - name: step_2_net_income
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.23 step 2
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/23
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: gross_income }
          right: { kind: derived, name: reliefs_total }

  # ----- Step 3 — allowances → taxable income -------------------------------

  # Marriage allowance: one spouse (donor) transfers £1,260 of PA to their
  # partner (recipient), provided the donor is not a higher- or additional-
  # rate taxpayer. The recipient gets a £252 (= 20% × £1,260) reducer at
  # Step 6, not an allowance. We accept two bool inputs: one for donors
  # (reduces PA), one for recipients (feeds into Step 6 reducers below).
  - name: marriage_allowance_donor
    entity: Taxpayer
    dtype: bool
    source: ITA 2007 s.55B
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/55B
    semantics: scalar
    expr:
      kind: input_or_else
      name: marriage_allowance_donor
      default: { kind: bool, value: false }

  - name: marriage_allowance_outbound
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.55B
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/55B
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: comparison
        left:
          kind: derived
          name: marriage_allowance_donor
        op: eq
        right:
          kind: literal
          value: { kind: bool, value: true }
      then_expr:
        kind: parameter_lookup
        parameter: uk_marriage_allowance_transfer
        index: { kind: literal, value: { kind: integer, value: 0 } }
      else_expr:
        kind: literal
        value: { kind: decimal, value: "0" }

  - name: blind_persons_allowance
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.38
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/38
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: comparison
        left:
          kind: input_or_else
          name: blind_persons_allowance_eligible
          default: { kind: bool, value: false }
        op: eq
        right:
          kind: literal
          value: { kind: bool, value: true }
      then_expr:
        kind: parameter_lookup
        parameter: uk_blind_persons_allowance
        index: { kind: literal, value: { kind: integer, value: 0 } }
      else_expr:
        kind: literal
        value: { kind: decimal, value: "0" }

  # Personal allowance taper (ITA 2007 s.35(2)): reduce PA by £1 for every £2
  # of adjusted net income over £100,000. "Adjusted net income" here is total
  # income less reliefs less grossed-up Gift Aid less grossed-up pension RAS
  # (defined below).
  - name: gift_aid_net
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.414
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/414
    semantics: scalar
    expr:
      kind: input_or_else
      name: gift_aid_net
      default: { kind: decimal, value: "0" }

  - name: pension_contributions_net
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: FA 2004 s.192
    source_url: https://www.legislation.gov.uk/ukpga/2004/12/section/192
    semantics: scalar
    expr:
      kind: input_or_else
      name: pension_contributions_ras_net
      default: { kind: decimal, value: "0" }

  - name: gift_aid_gross
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.414
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/414
    semantics: scalar
    expr:
      kind: div
      left: { kind: derived, name: gift_aid_net }
      right:
        kind: parameter_lookup
        parameter: uk_gift_aid_grossup_divisor
        index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: pension_contributions_gross
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: FA 2004 s.192
    source_url: https://www.legislation.gov.uk/ukpga/2004/12/section/192
    semantics: scalar
    expr:
      kind: div
      left: { kind: derived, name: pension_contributions_net }
      right:
        kind: parameter_lookup
        parameter: uk_gift_aid_grossup_divisor
        index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: band_extension
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.192
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/192
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: derived
          name: gift_aid_gross
        - kind: derived
          name: pension_contributions_gross

  - name: adjusted_net_income
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.58
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/58
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: step_2_net_income }
          right: { kind: derived, name: band_extension }

  - name: pa_taper_amount
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.35(2)
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/35
    semantics: scalar
    expr:
      kind: div
      left:
        kind: max
        items:
          - kind: literal
            value: { kind: decimal, value: "0" }
          - kind: sub
            left: { kind: derived, name: adjusted_net_income }
            right:
              kind: parameter_lookup
              parameter: uk_pa_taper_threshold
              index: { kind: literal, value: { kind: integer, value: 0 } }
      right:
        kind: literal
        value: { kind: decimal, value: "2" }

  - name: personal_allowance_tapered
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.35
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/35
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: parameter_lookup
            parameter: uk_personal_allowance
            index: { kind: literal, value: { kind: integer, value: 0 } }
          right: { kind: derived, name: pa_taper_amount }

  # Public-facing "personal_allowance" output: PA after taper, plus BPA, minus
  # marriage allowance outbound transfer. This is the amount deducted from
  # total income to arrive at taxable income.
  - name: personal_allowance
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.23 step 3
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/23
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: add
            items:
              - kind: derived
                name: personal_allowance_tapered
              - kind: derived
                name: blind_persons_allowance
          right: { kind: derived, name: marriage_allowance_outbound }

  - name: taxable_income
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.23 step 3
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/23
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: step_2_net_income }
          right: { kind: derived, name: personal_allowance }

  # Allocate the PA across income types. HMRC uses the most tax-efficient
  # allocation: PA goes against NSND first (highest-taxed), then savings, then
  # dividends. We take the simpler approach of applying PA against NSND first,
  # which matches HMRC outcome for all but a tiny minority of edge cases.
  - name: nsnd_taxable_income
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.16
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/16
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: nsnd_income }
          right: { kind: derived, name: personal_allowance }

  - name: pa_unused_after_nsnd
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.25
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/25
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: personal_allowance }
          right: { kind: derived, name: nsnd_income }

  - name: savings_taxable_income
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.18
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/18
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: savings_income }
          right: { kind: derived, name: pa_unused_after_nsnd }

  - name: pa_unused_after_savings
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.25
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/25
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: pa_unused_after_nsnd }
          right: { kind: derived, name: savings_income }

  - name: dividend_taxable_income
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.19
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/19
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: dividend_income }
          right: { kind: derived, name: pa_unused_after_savings }

  # ----- Step 4 — rates ------------------------------------------------------

  # Band-extended thresholds for rUK / Welsh / Scottish savings and dividend
  # ladders. Both Gift Aid and relief-at-source pensions widen the basic rate
  # band by the grossed-up amount (s.192 ITA / s.192 FA 2004); the higher rate
  # band is pushed up in tandem.
  - name: basic_rate_limit
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.10
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/10
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: parameter_lookup
          parameter: uk_basic_rate_band
          index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: derived
          name: band_extension

  - name: additional_rate_threshold
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.10
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/10
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: parameter_lookup
          parameter: uk_additional_rate_threshold
          index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: derived
          name: band_extension

  # NSND band amounts on the rUK / Welsh ladder.
  - name: nsnd_basic_band_amount_ruk
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.10
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/10
    semantics: scalar
    expr:
      kind: min
      items:
        - kind: derived
          name: nsnd_taxable_income
        - kind: derived
          name: basic_rate_limit

  - name: nsnd_higher_band_amount_ruk
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.10
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/10
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: min
            items:
              - kind: derived
                name: nsnd_taxable_income
              - kind: derived
                name: additional_rate_threshold
          right: { kind: derived, name: basic_rate_limit }

  - name: nsnd_additional_band_amount_ruk
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.10
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/10
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: nsnd_taxable_income }
          right: { kind: derived, name: additional_rate_threshold }

  - name: nsnd_tax_ruk
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.10
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/10
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: mul
          left: { kind: derived, name: nsnd_basic_band_amount_ruk }
          right:
            kind: parameter_lookup
            parameter: uk_basic_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: mul
          left: { kind: derived, name: nsnd_higher_band_amount_ruk }
          right:
            kind: parameter_lookup
            parameter: uk_higher_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: mul
          left: { kind: derived, name: nsnd_additional_band_amount_ruk }
          right:
            kind: parameter_lookup
            parameter: uk_additional_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }

  # NSND band amounts on the Scottish six-band ladder. Bands are cumulative
  # upper bounds on NSND taxable income; the amount in band k is
  # `min(nsnd, upper_k) - min(nsnd, upper_{k-1})`.
  - name: nsnd_starter_band_amount_scot
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.6A
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/6A
    semantics: scalar
    expr:
      kind: min
      items:
        - kind: derived
          name: nsnd_taxable_income
        - kind: parameter_lookup
          parameter: uk_scottish_starter_limit
          index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: nsnd_basic_band_amount_scot
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.6A
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/6A
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: min
            items:
              - kind: derived
                name: nsnd_taxable_income
              - kind: parameter_lookup
                parameter: uk_scottish_basic_limit
                index: { kind: literal, value: { kind: integer, value: 0 } }
          right:
            kind: parameter_lookup
            parameter: uk_scottish_starter_limit
            index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: nsnd_intermediate_band_amount_scot
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.6A
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/6A
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: min
            items:
              - kind: derived
                name: nsnd_taxable_income
              - kind: parameter_lookup
                parameter: uk_scottish_intermediate_limit
                index: { kind: literal, value: { kind: integer, value: 0 } }
          right:
            kind: parameter_lookup
            parameter: uk_scottish_basic_limit
            index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: nsnd_higher_band_amount_scot
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.6A
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/6A
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: min
            items:
              - kind: derived
                name: nsnd_taxable_income
              - kind: parameter_lookup
                parameter: uk_scottish_higher_limit
                index: { kind: literal, value: { kind: integer, value: 0 } }
          right:
            kind: parameter_lookup
            parameter: uk_scottish_intermediate_limit
            index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: nsnd_advanced_band_amount_scot
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.6A
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/6A
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: min
            items:
              - kind: derived
                name: nsnd_taxable_income
              - kind: parameter_lookup
                parameter: uk_scottish_advanced_limit
                index: { kind: literal, value: { kind: integer, value: 0 } }
          right:
            kind: parameter_lookup
            parameter: uk_scottish_higher_limit
            index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: nsnd_top_band_amount_scot
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.6A
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/6A
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: nsnd_taxable_income }
          right:
            kind: parameter_lookup
            parameter: uk_scottish_advanced_limit
            index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: nsnd_tax_scotland
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.6A
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/6A
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: mul
          left: { kind: derived, name: nsnd_starter_band_amount_scot }
          right:
            kind: parameter_lookup
            parameter: uk_scottish_starter_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: mul
          left: { kind: derived, name: nsnd_basic_band_amount_scot }
          right:
            kind: parameter_lookup
            parameter: uk_scottish_basic_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: mul
          left: { kind: derived, name: nsnd_intermediate_band_amount_scot }
          right:
            kind: parameter_lookup
            parameter: uk_scottish_intermediate_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: mul
          left: { kind: derived, name: nsnd_higher_band_amount_scot }
          right:
            kind: parameter_lookup
            parameter: uk_scottish_higher_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: mul
          left: { kind: derived, name: nsnd_advanced_band_amount_scot }
          right:
            kind: parameter_lookup
            parameter: uk_scottish_advanced_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: mul
          left: { kind: derived, name: nsnd_top_band_amount_scot }
          right:
            kind: parameter_lookup
            parameter: uk_scottish_top_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }

  # Country-of-residence selector. `country` is an optional text input:
  # "scotland" picks the Scottish ladder, anything else (or missing) picks
  # the rUK / Welsh ladder. Welsh rates match rUK at present, so they share
  # the same derived path.
  - name: is_scottish_resident
    entity: Taxpayer
    dtype: bool
    source: ITA 2007 s.6A
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/6A
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: comparison
        left:
          kind: input
          name: country
        op: eq
        right:
          kind: literal
          value: { kind: text, value: "scotland" }
      then_expr:
        kind: literal
        value: { kind: bool, value: true }
      else_expr:
        kind: literal
        value: { kind: bool, value: false }

  - name: nsnd_tax
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.23 step 4
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/23
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: comparison
        left: { kind: derived, name: is_scottish_resident }
        op: eq
        right:
          kind: literal
          value: { kind: bool, value: true }
      then_expr: { kind: derived, name: nsnd_tax_scotland }
      else_expr: { kind: derived, name: nsnd_tax_ruk }

  # Savings tax. Savings income stacks on top of NSND in the rUK band ladder.
  # Two 0% slices come off first:
  #   - starting rate for savings (ITA s.12): up to £5,000 at 0%, tapered £1
  #     for £1 by NSND taxable income
  #   - personal savings allowance (ITA s.12B): £1,000 / £500 / £0 depending on
  #     marginal band — based on whether NSND+savings+dividends land the
  #     taxpayer in basic / higher / additional territory
  - name: starting_rate_for_savings_available
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.12
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/12
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: parameter_lookup
            parameter: uk_starting_rate_for_savings_band
            index: { kind: literal, value: { kind: integer, value: 0 } }
          right: { kind: derived, name: nsnd_taxable_income }

  - name: savings_at_starting_rate
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.12
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/12
    semantics: scalar
    expr:
      kind: min
      items:
        - kind: derived
          name: savings_taxable_income
        - kind: derived
          name: starting_rate_for_savings_available

  # Marginal-rate test for PSA. The taxpayer is a higher-rate taxpayer if
  # total taxable income exceeds the basic-rate limit; additional-rate if it
  # exceeds the additional-rate threshold.
  - name: total_taxable_income_before_allowances
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.12B
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/12B
    semantics: scalar
    expr:
      kind: derived
      name: taxable_income

  - name: is_additional_rate_taxpayer
    entity: Taxpayer
    dtype: bool
    source: ITA 2007 s.12B
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/12B
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: comparison
        left: { kind: derived, name: total_taxable_income_before_allowances }
        op: gt
        right: { kind: derived, name: additional_rate_threshold }
      then_expr:
        kind: literal
        value: { kind: bool, value: true }
      else_expr:
        kind: literal
        value: { kind: bool, value: false }

  - name: is_higher_rate_taxpayer
    entity: Taxpayer
    dtype: bool
    source: ITA 2007 s.12B
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/12B
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: comparison
        left: { kind: derived, name: total_taxable_income_before_allowances }
        op: gt
        right: { kind: derived, name: basic_rate_limit }
      then_expr:
        kind: literal
        value: { kind: bool, value: true }
      else_expr:
        kind: literal
        value: { kind: bool, value: false }

  - name: personal_savings_allowance
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.12B
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/12B
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: comparison
        left: { kind: derived, name: is_additional_rate_taxpayer }
        op: eq
        right:
          kind: literal
          value: { kind: bool, value: true }
      then_expr:
        kind: literal
        value: { kind: decimal, value: "0" }
      else_expr:
        kind: if
        condition:
          kind: comparison
          left: { kind: derived, name: is_higher_rate_taxpayer }
          op: eq
          right:
            kind: literal
            value: { kind: bool, value: true }
        then_expr:
          kind: parameter_lookup
          parameter: uk_psa_higher
          index: { kind: literal, value: { kind: integer, value: 0 } }
        else_expr:
          kind: parameter_lookup
          parameter: uk_psa_basic
          index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: savings_at_psa
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.12B
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/12B
    semantics: scalar
    expr:
      kind: min
      items:
        - kind: max
          items:
            - kind: literal
              value: { kind: decimal, value: "0" }
            - kind: sub
              left: { kind: derived, name: savings_taxable_income }
              right: { kind: derived, name: savings_at_starting_rate }
        - kind: derived
          name: personal_savings_allowance

  - name: savings_taxable_after_0pc_slices
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.12B
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/12B
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: sub
            left: { kind: derived, name: savings_taxable_income }
            right: { kind: derived, name: savings_at_starting_rate }
          right: { kind: derived, name: savings_at_psa }

  # Position in the band ladder where savings income starts being taxed at
  # non-zero rates. Equals NSND taxable + starting-rate slice + PSA slice.
  - name: savings_ladder_start
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.16
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/16
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: derived
          name: nsnd_taxable_income
        - kind: derived
          name: savings_at_starting_rate
        - kind: derived
          name: savings_at_psa

  - name: savings_basic_band_amount
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.11A
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/11A
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: min
            items:
              - kind: add
                items:
                  - kind: derived
                    name: savings_ladder_start
                  - kind: derived
                    name: savings_taxable_after_0pc_slices
              - kind: derived
                name: basic_rate_limit
          right: { kind: derived, name: savings_ladder_start }

  - name: savings_higher_band_amount
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.11A
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/11A
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: min
            items:
              - kind: add
                items:
                  - kind: derived
                    name: savings_ladder_start
                  - kind: derived
                    name: savings_taxable_after_0pc_slices
              - kind: derived
                name: additional_rate_threshold
          right:
            kind: max
            items:
              - kind: derived
                name: savings_ladder_start
              - kind: derived
                name: basic_rate_limit

  - name: savings_additional_band_amount
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.11A
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/11A
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: add
            items:
              - kind: derived
                name: savings_ladder_start
              - kind: derived
                name: savings_taxable_after_0pc_slices
          right:
            kind: max
            items:
              - kind: derived
                name: savings_ladder_start
              - kind: derived
                name: additional_rate_threshold

  - name: savings_tax
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.23 step 4
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/23
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: mul
          left: { kind: derived, name: savings_basic_band_amount }
          right:
            kind: parameter_lookup
            parameter: uk_basic_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: mul
          left: { kind: derived, name: savings_higher_band_amount }
          right:
            kind: parameter_lookup
            parameter: uk_higher_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: mul
          left: { kind: derived, name: savings_additional_band_amount }
          right:
            kind: parameter_lookup
            parameter: uk_additional_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }

  # Dividend tax. Dividends stack above savings. £500 at 0% comes off first
  # (dividend allowance), then residual is taxed at 8.75 / 33.75 / 39.35.
  - name: dividend_ladder_start
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.19
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/19
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: derived
          name: savings_ladder_start
        - kind: derived
          name: savings_taxable_after_0pc_slices

  - name: dividend_at_allowance
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.13A
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/13A
    semantics: scalar
    expr:
      kind: min
      items:
        - kind: derived
          name: dividend_taxable_income
        - kind: parameter_lookup
          parameter: uk_dividend_allowance
          index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: dividend_taxable_after_allowance
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.13A
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/13A
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: dividend_taxable_income }
          right: { kind: derived, name: dividend_at_allowance }

  # The dividend allowance is a 0% rate slice — it still occupies band space.
  - name: dividend_ladder_start_after_allowance
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.13A
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/13A
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: derived
          name: dividend_ladder_start
        - kind: derived
          name: dividend_at_allowance

  - name: dividend_basic_band_amount
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITTOIA 2005 s.13
    source_url: https://www.legislation.gov.uk/ukpga/2005/5/section/13
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: min
            items:
              - kind: add
                items:
                  - kind: derived
                    name: dividend_ladder_start_after_allowance
                  - kind: derived
                    name: dividend_taxable_after_allowance
              - kind: derived
                name: basic_rate_limit
          right: { kind: derived, name: dividend_ladder_start_after_allowance }

  - name: dividend_higher_band_amount
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITTOIA 2005 s.13
    source_url: https://www.legislation.gov.uk/ukpga/2005/5/section/13
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: min
            items:
              - kind: add
                items:
                  - kind: derived
                    name: dividend_ladder_start_after_allowance
                  - kind: derived
                    name: dividend_taxable_after_allowance
              - kind: derived
                name: additional_rate_threshold
          right:
            kind: max
            items:
              - kind: derived
                name: dividend_ladder_start_after_allowance
              - kind: derived
                name: basic_rate_limit

  - name: dividend_additional_band_amount
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITTOIA 2005 s.13
    source_url: https://www.legislation.gov.uk/ukpga/2005/5/section/13
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: add
            items:
              - kind: derived
                name: dividend_ladder_start_after_allowance
              - kind: derived
                name: dividend_taxable_after_allowance
          right:
            kind: max
            items:
              - kind: derived
                name: dividend_ladder_start_after_allowance
              - kind: derived
                name: additional_rate_threshold

  - name: dividend_tax
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITTOIA 2005 s.13
    source_url: https://www.legislation.gov.uk/ukpga/2005/5/section/13
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: mul
          left: { kind: derived, name: dividend_basic_band_amount }
          right:
            kind: parameter_lookup
            parameter: uk_dividend_basic_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: mul
          left: { kind: derived, name: dividend_higher_band_amount }
          right:
            kind: parameter_lookup
            parameter: uk_dividend_higher_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: mul
          left: { kind: derived, name: dividend_additional_band_amount }
          right:
            kind: parameter_lookup
            parameter: uk_dividend_additional_rate
            index: { kind: literal, value: { kind: integer, value: 0 } }

  # ----- Step 5 — sum of tax-at-rate ----------------------------------------

  - name: income_tax_before_reducers
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.23 step 5
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/23
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: derived
          name: nsnd_tax
        - kind: derived
          name: savings_tax
        - kind: derived
          name: dividend_tax

  # ----- Step 6 — tax reducers ---------------------------------------------

  - name: marriage_allowance_reducer
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.55C
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/55C
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: comparison
        left:
          kind: input_or_else
          name: marriage_allowance_recipient
          default: { kind: bool, value: false }
        op: eq
        right:
          kind: literal
          value: { kind: bool, value: true }
      then_expr:
        kind: parameter_lookup
        parameter: uk_marriage_allowance_reducer
        index: { kind: literal, value: { kind: integer, value: 0 } }
      else_expr:
        kind: literal
        value: { kind: decimal, value: "0" }

  - name: eis_reducer
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.158
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/158
    semantics: scalar
    expr:
      kind: mul
      left:
        kind: input_or_else
        name: eis_subscription
        default: { kind: decimal, value: "0" }
      right:
        kind: parameter_lookup
        parameter: uk_eis_rate
        index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: seis_reducer
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.257AB
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/257AB
    semantics: scalar
    expr:
      kind: mul
      left:
        kind: input_or_else
        name: seis_subscription
        default: { kind: decimal, value: "0" }
      right:
        kind: parameter_lookup
        parameter: uk_seis_rate
        index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: vct_reducer
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.263
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/263
    semantics: scalar
    expr:
      kind: mul
      left:
        kind: input_or_else
        name: vct_subscription
        default: { kind: decimal, value: "0" }
      right:
        kind: parameter_lookup
        parameter: uk_vct_rate
        index: { kind: literal, value: { kind: integer, value: 0 } }

  # Reducers apply in the s.26 order and are each capped at the remaining tax
  # liability. We thread the residual through a chain of derived outputs.
  - name: tax_after_marriage_allowance
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.26
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/26
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: income_tax_before_reducers }
          right:
            kind: min
            items:
              - kind: derived
                name: marriage_allowance_reducer
              - kind: derived
                name: income_tax_before_reducers

  - name: tax_after_eis
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.26
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/26
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: tax_after_marriage_allowance }
          right:
            kind: min
            items:
              - kind: derived
                name: eis_reducer
              - kind: derived
                name: tax_after_marriage_allowance

  - name: tax_after_seis
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.26
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/26
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: tax_after_eis }
          right:
            kind: min
            items:
              - kind: derived
                name: seis_reducer
              - kind: derived
                name: tax_after_eis

  - name: tax_after_vct
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.26
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/26
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: tax_after_seis }
          right:
            kind: min
            items:
              - kind: derived
                name: vct_reducer
              - kind: derived
                name: tax_after_seis

  - name: tax_reducers_used
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.26
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/26
    semantics: scalar
    expr:
      kind: sub
      left: { kind: derived, name: income_tax_before_reducers }
      right: { kind: derived, name: tax_after_vct }

  # ----- Step 7 — additions (HICBC, Gift Aid recovery) ---------------------

  # HICBC: 1% per £200 of ANI over £60,000, capped at 100% at £80,000 (from
  # 6 April 2024).
  - name: hicbc_excess_over_threshold
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITEPA 2003 s.681C
    source_url: https://www.legislation.gov.uk/ukpga/2003/1/section/681C
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: adjusted_net_income }
          right:
            kind: parameter_lookup
            parameter: uk_hicbc_threshold
            index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: hicbc_percentage
    entity: Taxpayer
    dtype: decimal
    unit: ratio
    source: ITEPA 2003 s.681C
    source_url: https://www.legislation.gov.uk/ukpga/2003/1/section/681C
    semantics: scalar
    expr:
      kind: min
      items:
        - kind: parameter_lookup
          parameter: uk_hicbc_cap_percent
          index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: floor
          value:
            kind: div
            left: { kind: derived, name: hicbc_excess_over_threshold }
            right:
              kind: parameter_lookup
              parameter: uk_hicbc_step_amount
              index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: hicbc
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITEPA 2003 s.681B
    source_url: https://www.legislation.gov.uk/ukpga/2003/1/section/681B
    semantics: scalar
    expr:
      kind: div
      left:
        kind: mul
        left:
          kind: input_or_else
          name: child_benefit_received
          default: { kind: decimal, value: "0" }
        right: { kind: derived, name: hicbc_percentage }
      right:
        kind: literal
        value: { kind: decimal, value: "100" }

  # Gift Aid recovery (ITA s.424): if the basic-rate tax claimed on the
  # taxpayer's Gift Aid donations exceeds the tax they actually paid, they
  # owe the shortfall.
  - name: gift_aid_basic_rate_claimed
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.414
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/414
    semantics: scalar
    expr:
      kind: sub
      left: { kind: derived, name: gift_aid_gross }
      right: { kind: derived, name: gift_aid_net }

  - name: gift_aid_recovery
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.424
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/424
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left: { kind: derived, name: gift_aid_basic_rate_claimed }
          right: { kind: derived, name: tax_after_vct }

  - name: tax_additions
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.23 step 7
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/23
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: derived
          name: hicbc
        - kind: derived
          name: gift_aid_recovery

  # ----- Final outputs ------------------------------------------------------

  - name: income_tax
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.23
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/23
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: derived
          name: tax_after_vct
        - kind: derived
          name: tax_additions

  - name: net_income
    entity: Taxpayer
    dtype: decimal
    unit: GBP
    source: ITA 2007 s.23
    source_url: https://www.legislation.gov.uk/ukpga/2007/3/section/23
    semantics: scalar
    expr:
      kind: sub
      left: { kind: derived, name: gross_income }
      right: { kind: derived, name: income_tax }
