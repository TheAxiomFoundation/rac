format: rulespec/v1
module:
  summary: |-
    Flat-tax example programme.

    Each person has a personal allowance deducted from gross income to produce
    taxable income. A flat rate applies, with a higher rate when gross income
    reaches the high-income threshold. Tax is rounded up with ceil().

    Demonstrator programme — not modelled on any specific statute.
rules:
  - name: personal_allowance
    kind: parameter
    dtype: Money
    unit: USD
    versions:
      - effective_from: '2025-01-01'
        formula: '1000'
  - name: high_income_threshold
    kind: parameter
    dtype: Money
    unit: USD
    versions:
      - effective_from: '2025-01-01'
        formula: '3000'
  - name: basic_rate
    kind: parameter
    dtype: Rate
    versions:
      - effective_from: '2025-01-01'
        formula: '0.1'
  - name: high_rate
    kind: parameter
    dtype: Rate
    versions:
      - effective_from: '2025-01-01'
        formula: '0.2'
  - name: gross_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    versions:
      - effective_from: '2025-01-01'
        formula: income
  - name: taxable_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, gross_income - personal_allowance)
  - name: high_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    versions:
      - effective_from: '2025-01-01'
        formula: gross_income >= high_income_threshold
  - name: tax_rate
    kind: derived
    entity: Person
    dtype: Rate
    period: Year
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if high_income: high_rate
          else: basic_rate
  - name: income_tax
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    versions:
      - effective_from: '2025-01-01'
        formula: ceil(taxable_income * tax_rate)
  - name: net_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    versions:
      - effective_from: '2025-01-01'
        formula: gross_income - income_tax
