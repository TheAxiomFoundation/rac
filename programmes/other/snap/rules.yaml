format: rulespec/v1
module:
  id: other.snap
  summary: |-
    Federal SNAP (Supplemental Nutrition Assistance Program) monthly
    allotment — 48 states and DC rules, FY 2026 values from USDA FNS.

    Household-level calculation:
      1. Aggregate earned + unearned income from members.
      2. Subtract earned-income deduction (20%), standard deduction,
         dependent care, child support, medical deductions.
      3. Compute excess shelter deduction (uncapped if elderly/disabled
         household, otherwise capped at $744).
      4. Net income = adjusted − excess-shelter.
      5. Gross- and net-income eligibility tests.
      6. Allotment = max(max_allotment − 30% of net income, 0).

    Size-indexed tables (standard deduction / gross limit / net limit / max
    allotment) are expressed via `match household_size` — the deployed DSL
    doesn't carry indexed parameter tables, so explicit per-size cases keep
    every rate visible in one place per variable.
rules:
  - name: standard_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.9(c)(1)(i) standard deduction (FY 2026)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          match household_size:
              1 => 209
              2 => 209
              3 => 209
              4 => 223
              5 => 261
              6 => 299
              7 => 299
              8 => 299
  - name: gross_income_limit
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.9(a)(1) gross income limit (FY 2026)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          match household_size:
              1 => 1696
              2 => 2292
              3 => 2888
              4 => 3483
              5 => 4079
              6 => 4675
              7 => 5271
              8 => 5867
  - name: net_income_limit
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.9(a)(2) net income limit (FY 2026)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          match household_size:
              1 => 1305
              2 => 1763
              3 => 2221
              4 => 2680
              5 => 3138
              6 => 3596
              7 => 4055
              8 => 4513
  - name: max_allotment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.10(e)(4) maximum allotment (FY 2026)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          match household_size:
              1 => 298
              2 => 546
              3 => 785
              4 => 994
              5 => 1183
              6 => 1421
              7 => 1571
              8 => 1789
  - name: excess_shelter_deduction_cap
    kind: parameter
    dtype: Money
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: '744'
  - name: household_size
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    versions:
      - effective_from: '2025-10-01'
        formula: len(member_of_household)
  - name: earned_income_total
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: sum(member_of_household.earned_income)
  - name: unearned_income_total
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: sum(member_of_household.unearned_income)
  - name: gross_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: earned_income_total + unearned_income_total
  - name: earned_income_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.9(d)(2) earned-income deduction = 20% of earned income
    versions:
      - effective_from: '2025-10-01'
        formula: earned_income_total * 0.2
  - name: adjusted_income_before_shelter
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          gross_income
          - earned_income_deduction
          - standard_deduction
          - dependent_care_deduction
          - child_support_deduction
          - medical_deduction
  - name: half_adjusted_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: adjusted_income_before_shelter / 2
  - name: elderly_or_disabled_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.9(d)(6)(i)(B)
    versions:
      - effective_from: '2025-10-01'
        formula: has_elderly_or_disabled_member
  - name: excess_shelter_unclamped
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, shelter_costs - half_adjusted_income)
  - name: excess_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.9(d)(6)(i)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if elderly_or_disabled_household: excess_shelter_unclamped
          else: min(excess_shelter_unclamped, excess_shelter_deduction_cap)
  - name: net_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: adjusted_income_before_shelter - excess_shelter_deduction
  - name: passes_gross_income_test
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.9(a)(1) with elderly/disabled exception
    versions:
      - effective_from: '2025-10-01'
        formula: elderly_or_disabled_household or gross_income <= gross_income_limit
  - name: passes_net_income_test
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.9(a)(2)
    versions:
      - effective_from: '2025-10-01'
        formula: net_income <= net_income_limit
  - name: snap_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 7 CFR 273.9(a)
    versions:
      - effective_from: '2025-10-01'
        formula: passes_gross_income_test and passes_net_income_test
  - name: net_income_for_benefit_formula
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, net_income)
  - name: household_food_contribution
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.10(e)(2)(ii)(A) — 30% of net income
    versions:
      - effective_from: '2025-10-01'
        formula: ceil(net_income_for_benefit_formula * 0.3)
  - name: snap_allotment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.10(e)(2) monthly allotment
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_eligible: max(0, max_allotment - household_food_contribution)
          else: 0
