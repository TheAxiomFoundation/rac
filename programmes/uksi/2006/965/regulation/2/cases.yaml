cases:
  - name: single_claim_one_child_eldest
    claimant_id: claimant-1
    period:
      period_kind: benefit_week
      start: 2025-05-05
      end: 2025-05-11
    is_voluntary_org: false
    children:
      - id: child-a
        is_eldest_in_household: true
        resides_with_parent: false
    expected:
      num_children_total: 1
      num_children_eligible_for_enhanced: 1
      num_enhanced_rate: 1
      num_standard_rate: 0
      weekly_child_benefit: "26.05"

  - name: two_children_eldest_plus_younger
    claimant_id: claimant-2
    period:
      period_kind: benefit_week
      start: 2025-05-05
      end: 2025-05-11
    is_voluntary_org: false
    children:
      - id: child-b1
        is_eldest_in_household: true
        resides_with_parent: false
      - id: child-b2
        is_eldest_in_household: false
        resides_with_parent: false
    expected:
      num_children_total: 2
      num_children_eligible_for_enhanced: 1
      num_enhanced_rate: 1
      num_standard_rate: 1
      weekly_child_benefit: "43.30"

  - name: voluntary_org_no_enhanced_rate
    claimant_id: claimant-3
    period:
      period_kind: benefit_week
      start: 2025-05-05
      end: 2025-05-11
    is_voluntary_org: true
    children:
      - id: child-c
        is_eldest_in_household: true
        resides_with_parent: false
    expected:
      num_children_total: 1
      num_children_eligible_for_enhanced: 1
      num_enhanced_rate: 0
      num_standard_rate: 1
      weekly_child_benefit: "17.25"

  - name: residing_with_parent_disapplies_enhancement
    claimant_id: claimant-4
    period:
      period_kind: benefit_week
      start: 2025-05-05
      end: 2025-05-11
    is_voluntary_org: false
    children:
      - id: child-d
        is_eldest_in_household: true
        resides_with_parent: true
    expected:
      num_children_total: 1
      num_children_eligible_for_enhanced: 0
      num_enhanced_rate: 0
      num_standard_rate: 1
      weekly_child_benefit: "17.25"

  - name: three_children_one_enhanced
    claimant_id: claimant-5
    period:
      period_kind: benefit_week
      start: 2025-05-05
      end: 2025-05-11
    is_voluntary_org: false
    children:
      - id: child-e1
        is_eldest_in_household: true
        resides_with_parent: false
      - id: child-e2
        is_eldest_in_household: false
        resides_with_parent: false
      - id: child-e3
        is_eldest_in_household: false
        resides_with_parent: false
    expected:
      num_children_total: 3
      num_enhanced_rate: 1
      num_standard_rate: 2
      weekly_child_benefit: "60.55"

  - name: cohabiting_partner_holds_eldest
    claimant_id: claimant-6
    period:
      period_kind: benefit_week
      start: 2025-05-05
      end: 2025-05-11
    is_voluntary_org: false
    children:
      # This claimant has two children but the partner holds the eldest in
      # the joint household, so neither child here is eldest-in-household.
      - id: child-f1
        is_eldest_in_household: false
        resides_with_parent: false
      - id: child-f2
        is_eldest_in_household: false
        resides_with_parent: false
    expected:
      num_children_total: 2
      num_enhanced_rate: 0
      num_standard_rate: 2
      weekly_child_benefit: "34.50"
