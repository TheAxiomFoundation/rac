# Texas SNAP overlay — extends federal SNAP with Texas-administered parameter
# values sourced from the Texas Works Handbook and HHSC bulletins.
#
# Texas exercises delegated authority under the federal SNAP framework to set
# state-specific deduction amounts. For each override below, the authoritative
# source is cited via the parameter's versions metadata and the `sets` relation
# lives in the sidecar at:
#   rac-us-tx/sources/targets/txhhs/twh/current-effective/*.meta.yaml
#
# This overlay covers the SME (standard medical expense) deduction election
# from MEPD and TW Bulletin 25-15 (effective 2025-10-01). Further parameters
# (SUA, BUA, TUA, homeless shelter deduction) are pending atlas archival.

extends: ../federal/program.yaml

parameters:
  # TWH / MEPD and TW Bulletin 25-15, §2, "standard medical expense deduction":
  # "SME Deduction - $170 (minus $35)". Texas elects the FNS flat-amount SME
  # option under 7 CFR 273.9(d)(3)(x); amount of $170 applies to any
  # elderly/disabled household with monthly medical expenses above $35.
  # Archive: ~/.arch/us-tx/txhhs/twh/current-effective/akn/source.akn.xml
  #          section eId = sec_bulletin_25_15_section_2_standard_medical_expense_deduction
  - name: snap_state_sme_flat_amount
    unit: USD
    versions:
      - effective_from: 2025-10-01
        values:
          0: { kind: decimal, value: "170" }
