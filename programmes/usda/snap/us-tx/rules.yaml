format: rulespec/v1
module:
  summary: |-
    Texas SNAP overlay — applies the Texas-elected standard medical expense
    (SME) flat amount of $170 to the federal calculation in
    `programmes/usda/snap/federal`. All other parameters follow the federal
    baseline.

    In the deployed DSL this would be an `amend` block against the federal
    programme; the Rust loader doesn't compose amendments yet, so the
    override is duplicated here by re-declaring the SME flat amount.
    Federal rules are otherwise copied to keep the overlay standalone until
    amendment-composition lands.

    Authority: TWH / MEPD + TW Bulletin 25-15 §2 (elected per 7 CFR
    273.9(d)(3)(x)).
rules:
  - name: snap_state_sme_flat_amount
    kind: parameter
    dtype: Money
    unit: USD
    source: TWH / TW Bulletin 25-15 §2
    versions:
      - effective_from: '2025-10-01'
        formula: '170'
  - name: snap_medical_deduction_threshold
    kind: parameter
    dtype: Money
    unit: USD
    versions:
      - effective_from: '2008-10-01'
        formula: '35'
  - name: standard_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          match household_size:
              1 => 209
              2 => 209
              3 => 209
              4 => 223
              5 => 261
              6 => 299
              7 => 299
              8 => 299
  - name: max_allotment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          match household_size:
              1 => 298
              2 => 546
              3 => 785
              4 => 994
              5 => 1183
              6 => 1421
              7 => 1571
              8 => 1789
  - name: excess_shelter_deduction_cap
    kind: parameter
    dtype: Money
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: '744'
  - name: household_size
    kind: derived
    entity: Household
    dtype: Integer
    period: Month
    versions:
      - effective_from: '2025-10-01'
        formula: len(member_of_household)
  - name: earned_income_total
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: sum(member_of_household.earned_income)
  - name: unearned_income_total
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: sum(member_of_household.unearned_income)
  - name: gross_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: earned_income_total + unearned_income_total
  - name: earned_income_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: earned_income_total * 0.2
  - name: elderly_or_disabled_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    versions:
      - effective_from: '2025-10-01'
        formula: has_elderly_or_disabled_member
  - name: medical_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 7 CFR 273.9(d)(3)(x) — Texas SME election
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if elderly_or_disabled_household:
              if total_medical_expenses > snap_medical_deduction_threshold:
                  snap_state_sme_flat_amount
              else: 0
          else: 0
  - name: net_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          gross_income - earned_income_deduction - standard_deduction
          - medical_deduction
  - name: snap_allotment
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    versions:
      - effective_from: '2025-10-01'
        formula: max(0, max_allotment - ceil(max(0, net_income) * 0.3))
