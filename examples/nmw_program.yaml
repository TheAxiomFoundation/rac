# National Minimum Wage Act 1998 s.1 — worker's entitlement and compliance test.
#
# A person qualifies for the NMW if they (a) are a worker, (b) work or
# ordinarily work in the UK under their contract, and (c) have ceased to be
# of compulsory school age. The rate is a single hourly figure set by the
# Secretary of State (subs (3)), with age-banded variants set by regulations
# made under ss.1-3. Our encoding uses the 2025-26 rates:
#   21+ (National Living Wage): £12.21
#   18-20:                       £10.00
#   16-17 and apprentices:       £7.55
#
# The programme computes band, rate owed, effective hourly pay, compliance,
# and the shortfall owed for the pay reference period.

units:
  - name: GBP
    kind: currency
    minor_units: 2
  - name: count
    kind: count
  - name: ratio
    kind: ratio
  - name: status
    kind: custom
    label: judgment
  - name: hours
    kind: duration

parameters:
  - name: nmw_hourly_rate_by_band
    unit: GBP
    versions:
      - effective_from: 2025-04-01
        values:
          0: { kind: decimal, value: "7.55" }    # apprentice or 16-17
          1: { kind: decimal, value: "10.00" }   # 18-20
          2: { kind: decimal, value: "12.21" }   # 21+

derived:
  - name: qualifies_for_nmw
    entity: Worker
    dtype: judgment
    unit: status
    source: "NMWA 1998 s.1(2) — worker, works in UK, above compulsory school age"
    source_url: "https://www.legislation.gov.uk/ukpga/1998/39/section/1"
    semantics: judgment
    expr:
      kind: and
      items:
        - kind: comparison
          left: { kind: input, name: is_worker }
          op: eq
          right: { kind: literal, value: { kind: bool, value: true } }
        - kind: comparison
          left: { kind: input, name: works_in_uk }
          op: eq
          right: { kind: literal, value: { kind: bool, value: true } }
        - kind: comparison
          left: { kind: input, name: above_compulsory_school_age }
          op: eq
          right: { kind: literal, value: { kind: bool, value: true } }

  - name: age_band_number
    entity: Worker
    dtype: integer
    unit: count
    source: "NMW age-band tiers (apprentice / 16-17 / 18-20 / 21+)"
    source_url: "https://www.legislation.gov.uk/ukpga/1998/39/section/1"
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: or
        items:
          - kind: comparison
            left: { kind: input, name: is_apprentice_first_year }
            op: eq
            right: { kind: literal, value: { kind: bool, value: true } }
          - kind: comparison
            left: { kind: input, name: current_age_years }
            op: lt
            right: { kind: literal, value: { kind: integer, value: 18 } }
      then_expr: { kind: literal, value: { kind: integer, value: 0 } }
      else_expr:
        kind: if
        condition:
          kind: comparison
          left: { kind: input, name: current_age_years }
          op: lt
          right: { kind: literal, value: { kind: integer, value: 21 } }
        then_expr: { kind: literal, value: { kind: integer, value: 1 } }
        else_expr: { kind: literal, value: { kind: integer, value: 2 } }

  - name: rate_owed
    entity: Worker
    dtype: decimal
    unit: GBP
    source: "NMWA 1998 s.1(3) — rate owed based on age band"
    source_url: "https://www.legislation.gov.uk/ukpga/1998/39/section/1"
    semantics: scalar
    expr:
      kind: parameter_lookup
      parameter: nmw_hourly_rate_by_band
      index:
        kind: derived
        name: age_band_number

  - name: effective_hourly
    entity: Worker
    dtype: decimal
    unit: GBP
    source: "NMWA 1998 s.1(1) read with reg 2 PRP — remuneration / hours"
    source_url: "https://www.legislation.gov.uk/ukpga/1998/39/section/1"
    semantics: scalar
    expr:
      kind: div
      left:
        kind: input
        name: remuneration_in_prp
      right:
        kind: max
        items:
          - kind: input
            name: hours_worked_in_prp
          - kind: literal
            value: { kind: decimal, value: "1" }

  - name: is_compliant
    entity: Worker
    dtype: judgment
    unit: status
    source: "NMWA 1998 s.1(1) — remuneration at or above NMW"
    source_url: "https://www.legislation.gov.uk/ukpga/1998/39/section/1"
    semantics: judgment
    expr:
      kind: comparison
      left:
        kind: derived
        name: effective_hourly
      op: gte
      right:
        kind: derived
        name: rate_owed

  - name: shortfall_total
    entity: Worker
    dtype: decimal
    unit: GBP
    source: "Derived shortfall owed for the pay reference period"
    source_url: "https://www.legislation.gov.uk/ukpga/1998/39/section/1"
    semantics: scalar
    expr:
      kind: mul
      left:
        kind: max
        items:
          - kind: literal
            value: { kind: decimal, value: "0" }
          - kind: sub
            left:
              kind: derived
              name: rate_owed
            right:
              kind: derived
              name: effective_hourly
      right:
        kind: input
        name: hours_worked_in_prp
