# Pensions Act 2014 s.4 — entitlement to state pension at the transitional rate.
# Exercises date comparisons inside a count_related where-clause.
#
# A person reaches entitlement when:
#   (1)(a) they have reached pensionable age,
#   (1)(b) they have at least the minimum number of qualifying years
#          (set by regulation, maximum 10),
#   (1)(c) they have at least one pre-commencement qualifying year.
# s.4(4) defines a pre-commencement qualifying year as either
#   * a qualifying year starting on or after 1978-04-06 and before 2016-04-06, OR
#   * a reckonable year deemed qualifying under reg 13(1) of SI 1979/643.
# s.4(5) says reckonable years count towards the minimum even though they
# are not "qualifying years" in the s.4 sense.

units:
  - name: count
    kind: count
  - name: status
    kind: custom
    label: judgment

relations:
  - name: qualifying_year_of
    arity: 2  # slot 0 = QualifyingYear, slot 1 = Person

parameters:
  - name: state_pension_minimum_qy_count
    unit: count
    versions:
      - effective_from: 2016-04-06
        values:
          0: { kind: integer, value: 10 }

derived:
  - name: pre_commencement_qy_count
    entity: Person
    dtype: integer
    unit: count
    source: "Pensions Act 2014 s.4(4) definition of pre-commencement qualifying year"
    source_url: "https://www.legislation.gov.uk/ukpga/2014/19/section/4"
    semantics: scalar
    expr:
      kind: count_related
      relation: qualifying_year_of
      current_slot: 1
      related_slot: 0
      where:
        kind: or
        items:
          - kind: and
            items:
              - kind: comparison
                left: { kind: input, name: is_qualifying }
                op: eq
                right:
                  kind: literal
                  value: { kind: bool, value: true }
              - kind: comparison
                left: { kind: input, name: year_start }
                op: gte
                right:
                  kind: literal
                  value: { kind: date, value: "1978-04-06" }
              - kind: comparison
                left: { kind: input, name: year_start }
                op: lt
                right:
                  kind: literal
                  value: { kind: date, value: "2016-04-06" }
          - kind: comparison
            left: { kind: input, name: is_reckonable_1979 }
            op: eq
            right:
              kind: literal
              value: { kind: bool, value: true }

  - name: post_commencement_qy_count
    entity: Person
    dtype: integer
    unit: count
    source: "Pensions Act 2014 s.4(4) post-commencement qualifying year"
    source_url: "https://www.legislation.gov.uk/ukpga/2014/19/section/4"
    semantics: scalar
    expr:
      kind: count_related
      relation: qualifying_year_of
      current_slot: 1
      related_slot: 0
      where:
        kind: and
        items:
          - kind: comparison
            left: { kind: input, name: is_qualifying }
            op: eq
            right:
              kind: literal
              value: { kind: bool, value: true }
          - kind: comparison
            left: { kind: input, name: year_start }
            op: gte
            right:
              kind: literal
              value: { kind: date, value: "2016-04-06" }

  - name: total_qy_count
    entity: Person
    dtype: integer
    unit: count
    source: "Pensions Act 2014 s.4(1)(b) and s.4(5)"
    source_url: "https://www.legislation.gov.uk/ukpga/2014/19/section/4"
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: derived
          name: pre_commencement_qy_count
        - kind: derived
          name: post_commencement_qy_count

  - name: reached_pensionable_age
    entity: Person
    dtype: judgment
    unit: status
    source: "Pensions Act 2014 s.4(1)(a)"
    source_url: "https://www.legislation.gov.uk/ukpga/2014/19/section/4"
    semantics: judgment
    expr:
      kind: comparison
      left:
        kind: input
        name: current_age_years
      op: gte
      right:
        kind: input
        name: pensionable_age_years

  - name: meets_minimum_qy
    entity: Person
    dtype: judgment
    unit: status
    source: "Pensions Act 2014 s.4(1)(b) and s.4(2)"
    source_url: "https://www.legislation.gov.uk/ukpga/2014/19/section/4"
    semantics: judgment
    expr:
      kind: comparison
      left:
        kind: derived
        name: total_qy_count
      op: gte
      right:
        kind: parameter_lookup
        parameter: state_pension_minimum_qy_count
        index:
          kind: literal
          value: { kind: integer, value: 0 }

  - name: has_any_pre_commencement_year
    entity: Person
    dtype: judgment
    unit: status
    source: "Pensions Act 2014 s.4(1)(c)"
    source_url: "https://www.legislation.gov.uk/ukpga/2014/19/section/4"
    semantics: judgment
    expr:
      kind: comparison
      left:
        kind: derived
        name: pre_commencement_qy_count
      op: gte
      right:
        kind: literal
        value: { kind: integer, value: 1 }

  - name: entitled_to_transitional_rate
    entity: Person
    dtype: judgment
    unit: status
    source: "Pensions Act 2014 s.4(1) combined conditions"
    source_url: "https://www.legislation.gov.uk/ukpga/2014/19/section/4"
    semantics: judgment
    expr:
      kind: and
      items:
        - kind: derived
          name: reached_pensionable_age
        - kind: derived
          name: meets_minimum_qy
        - kind: derived
          name: has_any_pre_commencement_year
