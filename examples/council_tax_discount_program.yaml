# Local Government Finance Act 1992 s.11 — council tax discounts.
#
# For a chargeable dwelling on any day:
#   subs (1)(a): one resident not disregarded       → single-occupier discount (25%)
#   subs (1)(b): two+ residents, all but one disregarded → single-occupier discount
#   subs (2):    no resident, or all residents disregarded → twice the discount (50%)
#                 (subject to overrides in ss.11A, 11B, 11C, 12, 12A, 12B)
#   else:        full charge — no discount
#
# "Appropriate percentage" is 25% unless the Secretary of State varies it by
# order for the financial year (subs (3)).
#
# Disregard determination (Schedule 1 — full-time students, severely mentally
# impaired, foreign diplomats, etc.) and the various override determinations
# (premium for long-term empties, second-homes surcharges) are legal facts
# pre-applied by the caller via the per-person `is_disregarded` flag and the
# per-dwelling `empty_home_override_applies` bool.

units:
  - name: ratio
    kind: ratio
  - name: count
    kind: count
  - name: status
    kind: custom
    label: judgment

relations:
  - name: resident_of
    arity: 2  # slot 0 = Person, slot 1 = Dwelling

parameters:
  - name: ctax_appropriate_percentage
    unit: ratio
    versions:
      - effective_from: 1993-04-01
        values:
          0: { kind: decimal, value: "0.25" }

derived:
  - name: num_non_disregarded_residents
    entity: Dwelling
    dtype: integer
    unit: count
    source: "LGFA 1992 s.11(1) and Sch 1 disregards"
    source_url: "https://www.legislation.gov.uk/ukpga/1992/14/section/11"
    semantics: scalar
    expr:
      kind: count_related
      relation: resident_of
      current_slot: 1
      related_slot: 0
      where:
        kind: comparison
        left: { kind: input, name: is_disregarded }
        op: eq
        right: { kind: literal, value: { kind: bool, value: false } }

  - name: single_occupier_discount_applies
    entity: Dwelling
    dtype: judgment
    unit: status
    source: "LGFA 1992 s.11(1) — exactly one non-disregarded resident"
    source_url: "https://www.legislation.gov.uk/ukpga/1992/14/section/11"
    semantics: judgment
    expr:
      kind: comparison
      left:
        kind: derived
        name: num_non_disregarded_residents
      op: eq
      right: { kind: literal, value: { kind: integer, value: 1 } }

  - name: empty_home_discount_applies
    entity: Dwelling
    dtype: judgment
    unit: status
    source: "LGFA 1992 s.11(2) — no non-disregarded residents and no override"
    source_url: "https://www.legislation.gov.uk/ukpga/1992/14/section/11"
    semantics: judgment
    expr:
      kind: and
      items:
        - kind: comparison
          left:
            kind: derived
            name: num_non_disregarded_residents
          op: eq
          right: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: comparison
          left: { kind: input, name: empty_home_override_applies }
          op: eq
          right: { kind: literal, value: { kind: bool, value: false } }

  - name: appropriate_percentage
    entity: Dwelling
    dtype: decimal
    unit: ratio
    source: "LGFA 1992 s.11(3) — appropriate percentage for the FY"
    source_url: "https://www.legislation.gov.uk/ukpga/1992/14/section/11"
    semantics: scalar
    expr:
      kind: parameter_lookup
      parameter: ctax_appropriate_percentage
      index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: discount_fraction
    entity: Dwelling
    dtype: decimal
    unit: ratio
    source: "LGFA 1992 s.11 combined — discount applied to the daily liability"
    source_url: "https://www.legislation.gov.uk/ukpga/1992/14/section/11"
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: derived
        name: single_occupier_discount_applies
      then_expr:
        kind: derived
        name: appropriate_percentage
      else_expr:
        kind: if
        condition:
          kind: derived
          name: empty_home_discount_applies
        then_expr:
          kind: mul
          left:
            kind: derived
            name: appropriate_percentage
          right:
            kind: literal
            value: { kind: decimal, value: "2" }
        else_expr:
          kind: literal
          value: { kind: decimal, value: "0" }
