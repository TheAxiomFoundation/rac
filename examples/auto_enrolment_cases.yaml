    current_age_years: 30
    pensionable_age_years: 67
    # Weekly PRP: £10,000 × (1/52 equivalent) — for simplicity passing
    # prp_months = 12/52 = 0.230769... The trigger becomes 10000 × 0.230769 / 12
    # = approx 192.31. Earnings of 250 exceed.
    earnings_this_prp: "250"
    prp_months: "0.230769230769"
    active_member_of_qualifying_scheme: false
    recently_opted_out: false
    expected:
      earnings_above_trigger: holds
      employer_enrolment_duty: holds
