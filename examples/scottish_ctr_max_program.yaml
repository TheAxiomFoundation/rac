# SSI 2021/249 reg 79 — Scottish Council Tax Reduction daily maximum.
#
# For a dwelling with annual council tax A (net of discounts and other
# reductions other than CTR), and B days in the relevant financial year,
# the applicant's daily maximum CTR is:
#   bands A–D:  A / B  −  non-dep deductions
#   bands E–H:  (A − A/C) / B  −  non-dep deductions
# where C is the band taper factor (1.075 / 1.125 / 1.175 / 1.225).
#
# Joint-and-several liability (reg 79(4)): A is divided by the number of
# persons jointly and severally liable, except where the joint liability
# sits only between partners (spouse / civil partner / cohabitee).
# Students (reg 20(2) of the 2012 Act) are excluded from the liable count —
# handled here via a `is_student` flag on each liable person with an
# anti-join in the count_related where-clause.
#
# Day-level arithmetic via days_between(period_start, period_end) is
# appropriate here — the statute itself denominates B in days.

units:
  - name: GBP
    kind: currency
    minor_units: 2
  - name: count
    kind: count
  - name: ratio
    kind: ratio
  - name: status
    kind: custom
    label: judgment

relations:
  - name: liable_person
    arity: 2  # slot 0 = Person, slot 1 = Dwelling

parameters:
  # Band-number lookup table for the taper factor C.
  # Values for A-D are set to 1 (not used; guarded by the band > 4 branch).
  # E = 9/8 (1.125)? The SSI actually states different values:
  #   E: 11/9 (1.222...) — no, reg 79(2) text: 1.075 for E, 1.125 for F,
  #   1.175 for G, 1.225 for H. Using those.
  - name: ctr_band_taper_factor
    unit: ratio
    versions:
      - effective_from: 2024-04-01
        values:
          1: { kind: decimal, value: "1" }       # A
          2: { kind: decimal, value: "1" }       # B
          3: { kind: decimal, value: "1" }       # C
          4: { kind: decimal, value: "1" }       # D
          5: { kind: decimal, value: "1.075" }   # E
          6: { kind: decimal, value: "1.125" }   # F
          7: { kind: decimal, value: "1.175" }   # G
          8: { kind: decimal, value: "1.225" }   # H

derived:
  - name: days_in_fy
    entity: Dwelling
    dtype: integer
    unit: count
    source: "SSI 2021/249 reg 79(1)(b) — B is the number of days in the financial year"
    source_url: "https://www.legislation.gov.uk/ssi/2021/249/regulation/79"
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: days_between
          from: { kind: period_start }
          to: { kind: period_end }
        - kind: literal
          value: { kind: integer, value: 1 }

  - name: num_non_student_liable
    entity: Dwelling
    dtype: integer
    unit: count
    source: "SSI 2021/249 reg 79(4) — excluding students per 2012 Act reg 20(2)"
    source_url: "https://www.legislation.gov.uk/ssi/2021/249/regulation/79"
    semantics: scalar
    expr:
      kind: count_related
      relation: liable_person
      current_slot: 1
      related_slot: 0
      where:
        kind: comparison
        left: { kind: input, name: is_student }
        op: eq
        right: { kind: literal, value: { kind: bool, value: false } }

  - name: a_raw
    entity: Dwelling
    dtype: decimal
    unit: GBP
    source: "SSI 2021/249 reg 79(1)(a) — council tax net of discounts and other reductions"
    source_url: "https://www.legislation.gov.uk/ssi/2021/249/regulation/79"
    semantics: scalar
    expr:
      kind: sub
      left:
        kind: sub
        left: { kind: input, name: ct_annual }
        right: { kind: input, name: ct_discounts }
      right: { kind: input, name: ct_other_reductions }

  - name: partner_only_joint_liability
    entity: Dwelling
    dtype: judgment
    unit: status
    source: "SSI 2021/249 reg 79(4) — partner-only carve-out"
    source_url: "https://www.legislation.gov.uk/ssi/2021/249/regulation/79"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: input, name: partner_only_joint }
      op: eq
      right: { kind: literal, value: { kind: bool, value: true } }

  - name: liable_divisor
    entity: Dwelling
    dtype: integer
    unit: count
    source: "SSI 2021/249 reg 79(4) — divisor for joint-and-several liability"
    source_url: "https://www.legislation.gov.uk/ssi/2021/249/regulation/79"
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: derived
        name: partner_only_joint_liability
      then_expr:
        kind: literal
        value: { kind: integer, value: 1 }
      else_expr:
        kind: max
        items:
          - kind: derived
            name: num_non_student_liable
          - kind: literal
            value: { kind: integer, value: 1 }

  - name: a_effective
    entity: Dwelling
    dtype: decimal
    unit: GBP
    source: "SSI 2021/249 reg 79(1)(a) and reg 79(4) combined"
    source_url: "https://www.legislation.gov.uk/ssi/2021/249/regulation/79"
    semantics: scalar
    expr:
      kind: div
      left:
        kind: derived
        name: a_raw
      right:
        kind: derived
        name: liable_divisor

  - name: is_band_e_to_h
    entity: Dwelling
    dtype: judgment
    unit: status
    source: "SSI 2021/249 reg 79(2) — taper applies for bands E–H"
    source_url: "https://www.legislation.gov.uk/ssi/2021/249/regulation/79"
    semantics: judgment
    expr:
      kind: comparison
      left: { kind: input, name: band_number }
      op: gt
      right: { kind: literal, value: { kind: integer, value: 4 } }

  - name: band_taper_factor
    entity: Dwelling
    dtype: decimal
    unit: ratio
    source: "SSI 2021/249 reg 79(2) — C factor by band"
    source_url: "https://www.legislation.gov.uk/ssi/2021/249/regulation/79"
    semantics: scalar
    expr:
      kind: parameter_lookup
      parameter: ctr_band_taper_factor
      index:
        kind: input
        name: band_number

  - name: a_after_taper
    entity: Dwelling
    dtype: decimal
    unit: GBP
    source: "SSI 2021/249 reg 79(2) — A − A/C for E–H, A otherwise"
    source_url: "https://www.legislation.gov.uk/ssi/2021/249/regulation/79"
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: derived
        name: is_band_e_to_h
      then_expr:
        kind: sub
        left:
          kind: derived
          name: a_effective
        right:
          kind: div
          left:
            kind: derived
            name: a_effective
          right:
            kind: derived
            name: band_taper_factor
      else_expr:
        kind: derived
        name: a_effective

  - name: daily_max_before_non_dep
    entity: Dwelling
    dtype: decimal
    unit: GBP
    source: "SSI 2021/249 reg 79(1) — A_after_taper / B"
    source_url: "https://www.legislation.gov.uk/ssi/2021/249/regulation/79"
    semantics: scalar
    expr:
      kind: div
      left:
        kind: derived
        name: a_after_taper
      right:
        kind: derived
        name: days_in_fy

  - name: daily_max_reduction
    entity: Dwelling
    dtype: decimal
    unit: GBP
    source: "SSI 2021/249 reg 79(1) — minus non-dep deductions, floor at 0"
    source_url: "https://www.legislation.gov.uk/ssi/2021/249/regulation/79"
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: derived
            name: daily_max_before_non_dep
          right:
            kind: input
            name: non_dep_deductions_daily
