# FA 2013 s.99 — Annual tax on enveloped dwellings (ATED) amount chargeable.
#
# For each chargeable period (1 April to 31 March), a chargeable person
# holding a single-dwelling interest with taxable value above £500,000 pays
# the annual chargeable amount determined by the band table in s.99(4). When
# the chargeable person is in charge on day 1 of the period the full annual
# amount is due; otherwise the charge is pro-rated by N/Y, where N is the
# number of days from the entry day (inclusive) to the end of the period and
# Y is the number of days in the period (s.99(6)).
#
# Parameter rates used are the 2024-25 figures. In practice bands are
# revalued every five years (next revaluation 1 April 2027).

units:
  - name: GBP
    kind: currency
    minor_units: 2
  - name: count
    kind: count
  - name: status
    kind: custom
    label: judgment

parameters:
  - name: ated_band_annual_amount
    unit: GBP
    versions:
      - effective_from: 2024-04-01
        values:
          0: { kind: decimal, value: "0" }          # below £500k — no charge
          1: { kind: decimal, value: "4400" }       # £500,001 – £1,000,000
          2: { kind: decimal, value: "9000" }       # £1,000,001 – £2,000,000
          3: { kind: decimal, value: "30550" }      # £2,000,001 – £5,000,000
          4: { kind: decimal, value: "71500" }      # £5,000,001 – £10,000,000
          5: { kind: decimal, value: "143550" }     # £10,000,001 – £20,000,000
          6: { kind: decimal, value: "287500" }     # over £20,000,000

derived:
  - name: days_in_period
    entity: DwellingInterest
    dtype: integer
    unit: count
    source: "FA 2013 s.99(6) denominator Y"
    source_url: "https://www.legislation.gov.uk/ukpga/2013/29/section/99"
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: days_between
          from:
            kind: period_start
          to:
            kind: period_end
        - kind: literal
          value: { kind: integer, value: 1 }

  - name: days_from_entry
    entity: DwellingInterest
    dtype: integer
    unit: count
    source: "FA 2013 s.99(6) numerator N (entry day to end of period inclusive)"
    source_url: "https://www.legislation.gov.uk/ukpga/2013/29/section/99"
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: days_between
          from:
            kind: input
            name: entry_day
          to:
            kind: period_end
        - kind: literal
          value: { kind: integer, value: 1 }

  - name: band_number
    entity: DwellingInterest
    dtype: integer
    unit: count
    source: "FA 2013 s.99(4) band table (left-open, right-closed)"
    source_url: "https://www.legislation.gov.uk/ukpga/2013/29/section/99"
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: comparison
        left: { kind: input, name: taxable_value }
        op: gt
        right: { kind: literal, value: { kind: decimal, value: "20000000" } }
      then_expr: { kind: literal, value: { kind: integer, value: 6 } }
      else_expr:
        kind: if
        condition:
          kind: comparison
          left: { kind: input, name: taxable_value }
          op: gt
          right: { kind: literal, value: { kind: decimal, value: "10000000" } }
        then_expr: { kind: literal, value: { kind: integer, value: 5 } }
        else_expr:
          kind: if
          condition:
            kind: comparison
            left: { kind: input, name: taxable_value }
            op: gt
            right: { kind: literal, value: { kind: decimal, value: "5000000" } }
          then_expr: { kind: literal, value: { kind: integer, value: 4 } }
          else_expr:
            kind: if
            condition:
              kind: comparison
              left: { kind: input, name: taxable_value }
              op: gt
              right: { kind: literal, value: { kind: decimal, value: "2000000" } }
            then_expr: { kind: literal, value: { kind: integer, value: 3 } }
            else_expr:
              kind: if
              condition:
                kind: comparison
                left: { kind: input, name: taxable_value }
                op: gt
                right: { kind: literal, value: { kind: decimal, value: "1000000" } }
              then_expr: { kind: literal, value: { kind: integer, value: 2 } }
              else_expr:
                kind: if
                condition:
                  kind: comparison
                  left: { kind: input, name: taxable_value }
                  op: gt
                  right: { kind: literal, value: { kind: decimal, value: "500000" } }
                then_expr: { kind: literal, value: { kind: integer, value: 1 } }
                else_expr: { kind: literal, value: { kind: integer, value: 0 } }

  - name: annual_chargeable_amount
    entity: DwellingInterest
    dtype: decimal
    unit: GBP
    source: "FA 2013 s.99(4) lookup"
    source_url: "https://www.legislation.gov.uk/ukpga/2013/29/section/99"
    semantics: scalar
    expr:
      kind: parameter_lookup
      parameter: ated_band_annual_amount
      index:
        kind: derived
        name: band_number

  - name: pro_rata_amount
    entity: DwellingInterest
    dtype: decimal
    unit: GBP
    source: "FA 2013 s.99(6) relevant fraction N/Y"
    source_url: "https://www.legislation.gov.uk/ukpga/2013/29/section/99"
    semantics: scalar
    expr:
      kind: div
      left:
        kind: mul
        left:
          kind: derived
          name: annual_chargeable_amount
        right:
          kind: derived
          name: days_from_entry
      right:
        kind: derived
        name: days_in_period

  - name: tax_chargeable
    entity: DwellingInterest
    dtype: decimal
    unit: GBP
    source: "FA 2013 s.99(2)-(3) full or pro-rated amount"
    source_url: "https://www.legislation.gov.uk/ukpga/2013/29/section/99"
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: comparison
        left: { kind: input, name: in_charge_on_first_day }
        op: eq
        right: { kind: literal, value: { kind: bool, value: true } }
      then_expr:
        kind: derived
        name: annual_chargeable_amount
      else_expr:
        kind: derived
        name: pro_rata_amount
