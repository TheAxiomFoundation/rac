units:
  - name: count
    kind: count
  - name: status
    kind: custom
    label: judgment
  - name: person_id
    kind: custom
    label: identity

relations:
  - name: cb_receipt
    arity: 2

derived:
  - name: cb_recipient_count
    entity: Child
    dtype: integer
    unit: count
    semantics: scalar
    expr:
      kind: count_related
      relation: cb_receipt
      current_slot: 1
      related_slot: 0

  - name: has_cb_recipient
    entity: Child
    dtype: judgment
    unit: status
    semantics: judgment
    expr:
      kind: comparison
      left:
        kind: derived
        name: cb_recipient_count
      op: gt
      right:
        kind: literal
        value:
          kind: integer
          value: 0

  - name: needs_fallback
    entity: Child
    dtype: judgment
    unit: status
    semantics: judgment
    expr:
      kind: comparison
      left:
        kind: derived
        name: cb_recipient_count
      op: eq
      right:
        kind: literal
        value:
          kind: integer
          value: 0

  - name: sole_claim_fallback
    entity: Child
    dtype: judgment
    unit: status
    semantics: judgment
    expr:
      kind: and
      items:
        - kind: derived
          name: needs_fallback
        - kind: comparison
          left:
            kind: input
            name: cb_claim_count
          op: eq
          right:
            kind: literal
            value:
              kind: integer
              value: 1

  - name: usual_residence_fallback
    entity: Child
    dtype: judgment
    unit: status
    semantics: judgment
    expr:
      kind: and
      items:
        - kind: derived
          name: needs_fallback
        - kind: not
          item:
            kind: comparison
            left:
              kind: input
              name: cb_claim_count
            op: eq
            right:
              kind: literal
              value:
                kind: integer
                value: 1

  - name: responsible_person
    entity: Child
    dtype: text
    unit: person_id
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: derived
        name: has_cb_recipient
      then_expr:
        kind: input
        name: cb_recipient_id
      else_expr:
        kind: if
        condition:
          kind: derived
          name: sole_claim_fallback
        then_expr:
          kind: input
          name: sole_claimant_id
        else_expr:
          kind: input
          name: usual_resident_id
