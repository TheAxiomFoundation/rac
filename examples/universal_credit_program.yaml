# Universal Credit — core monthly entitlement calculation, 2025-26 rates.
#
# Scope: standard allowance, child element (with the two-child limit handled by
# a pre-applied qualifying flag), disabled-child addition, LCWRA element,
# carer element, housing element (net of non-dep deductions), capital tariff
# income, unearned income deduction, earned income taper with work allowance,
# capital disentitlement above £16,000.
#
# Out of scope for this prototype (each of these is a layer of UC in its own
# right and most would fit cleanly once added — some need new DSL operators):
#
#   * Childcare costs element (complex eligibility + 85% cap).
#   * Benefit cap (another layer of min() across housing component).
#   * Transitional protection / managed migration run-on amounts.
#   * Mixed-age couple alternative amount (SPC gateway).
#   * Sanctions, hardship payments, third-party deductions.
#   * Work Capability Assessment determination — has_lcwra is an input.
#   * LHA / bedroom entitlement / service charge rules — eligible_housing_costs
#     and non_dep_deductions_total are pre-computed inputs.
#   * Two-child limit exceptions (multiple births, non-parental caring,
#     kinship care, etc.) — qualifies_for_child_element is a pre-applied flag.

units:
  - name: GBP
    kind: currency
    minor_units: 2
  - name: count
    kind: count
  - name: ratio
    kind: ratio
  - name: status
    kind: custom
    label: judgment

relations:
  - name: adult_of_benefit_unit
    arity: 2  # slot 0 = Adult, slot 1 = BenefitUnit
  - name: child_of_benefit_unit
    arity: 2  # slot 0 = Child, slot 1 = BenefitUnit

parameters:
  - name: uc_standard_allowance_single_under_25
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "316.98" }
      - effective_from: 2026-04-06
        values:
          0: { kind: decimal, value: "338.58" }
  - name: uc_standard_allowance_single_25_or_over
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "400.14" }
      - effective_from: 2026-04-06
        values:
          0: { kind: decimal, value: "424.90" }
  - name: uc_standard_allowance_couple_under_25
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "497.55" }
      - effective_from: 2026-04-06
        values:
          0: { kind: decimal, value: "528.34" }
  - name: uc_standard_allowance_couple_25_or_over
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "628.10" }
      - effective_from: 2026-04-06
        values:
          0: { kind: decimal, value: "666.97" }
  # UC Regs reg 24(2) as amended by SI 2017/376: the first child or qualifying
  # young person born before 6 April 2017 gets the higher-rate child element.
  # Every other qualifying child (including any first child born on or after
  # 6 April 2017) gets the standard rate.
  - name: uc_child_element_higher
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "339.00" }
      - effective_from: 2026-04-06
        values:
          0: { kind: decimal, value: "351.88" }
  - name: uc_child_element_standard
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "292.81" }
      - effective_from: 2026-04-06
        values:
          0: { kind: decimal, value: "303.94" }
  - name: uc_disabled_child_lower
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "158.76" }
      - effective_from: 2026-04-06
        values:
          0: { kind: decimal, value: "164.79" }
  - name: uc_disabled_child_higher
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "495.87" }
      - effective_from: 2026-04-06
        values:
          0: { kind: decimal, value: "514.71" }
  # LCWRA element: from April 2026 the standard rate for new claimants was
  # halved to £217.26, with a protected higher rate of £429.80 for claimants
  # whose LCWRA was awarded before 6 April 2026 or who are terminally ill or
  # have severe conditions. The prototype uses the new-claimant rate and does
  # not model the pre-2026 protection — see docs/fidelity.md.
  - name: uc_lcwra_element
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "423.27" }
      - effective_from: 2026-04-06
        values:
          0: { kind: decimal, value: "217.26" }
  - name: uc_carer_element
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "201.68" }
      - effective_from: 2026-04-06
        values:
          0: { kind: decimal, value: "209.34" }
  - name: uc_work_allowance_with_housing
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "411.00" }
      - effective_from: 2026-04-06
        values:
          0: { kind: decimal, value: "427.00" }
  - name: uc_work_allowance_without_housing
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "684.00" }
      - effective_from: 2026-04-06
        values:
          0: { kind: decimal, value: "710.00" }
  - name: uc_taper_rate
    unit: ratio
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "0.55" }
  - name: uc_capital_lower
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "6000" }
  - name: uc_capital_upper
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "16000" }
  - name: uc_capital_tariff_per_250
    unit: GBP
    versions:
      - effective_from: 2025-04-07
        values:
          0: { kind: decimal, value: "4.35" }

derived:
  # ---------------------------------------------------------------------------
  # Adult categorisation
  # ---------------------------------------------------------------------------

  - name: num_adults_25_or_over
    entity: BenefitUnit
    dtype: integer
    unit: count
    source: "UC Regs 2013 reg 36 table"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/36"
    semantics: scalar
    expr:
      kind: count_related
      relation: adult_of_benefit_unit
      current_slot: 1
      related_slot: 0
      where:
        kind: comparison
        left: { kind: input, name: age_25_or_over }
        op: eq
        right:
          kind: literal
          value: { kind: bool, value: true }

  - name: any_adult_25_or_over
    entity: BenefitUnit
    dtype: judgment
    unit: status
    source: "UC Regs 2013 reg 36 table"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/36"
    semantics: judgment
    expr:
      kind: comparison
      left:
        kind: derived
        name: num_adults_25_or_over
      op: gte
      right:
        kind: literal
        value: { kind: integer, value: 1 }

  # ---------------------------------------------------------------------------
  # Standard allowance (UC Regs reg 36)
  # ---------------------------------------------------------------------------

  - name: standard_allowance
    entity: BenefitUnit
    dtype: decimal
    unit: GBP
    source: "UC Regs 2013 reg 36"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/36"
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: comparison
        left: { kind: input, name: is_couple }
        op: eq
        right:
          kind: literal
          value: { kind: bool, value: true }
      then_expr:
        kind: if
        condition:
          kind: derived
          name: any_adult_25_or_over
        then_expr:
          kind: parameter_lookup
          parameter: uc_standard_allowance_couple_25_or_over
          index: { kind: literal, value: { kind: integer, value: 0 } }
        else_expr:
          kind: parameter_lookup
          parameter: uc_standard_allowance_couple_under_25
          index: { kind: literal, value: { kind: integer, value: 0 } }
      else_expr:
        kind: if
        condition:
          kind: derived
          name: any_adult_25_or_over
        then_expr:
          kind: parameter_lookup
          parameter: uc_standard_allowance_single_25_or_over
          index: { kind: literal, value: { kind: integer, value: 0 } }
        else_expr:
          kind: parameter_lookup
          parameter: uc_standard_allowance_single_under_25
          index: { kind: literal, value: { kind: integer, value: 0 } }

  # ---------------------------------------------------------------------------
  # Child element (UC Regs reg 24) and disabled-child addition (reg 24(2))
  # The two-child limit (reg 24B) is applied upstream via the
  # qualifies_for_child_element flag on each Child input.
  # ---------------------------------------------------------------------------

  - name: num_qualifying_children
    entity: BenefitUnit
    dtype: integer
    unit: count
    source: "UC Regs 2013 reg 24B (two-child limit; qualifying flag pre-applied)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/24B"
    semantics: scalar
    expr:
      kind: count_related
      relation: child_of_benefit_unit
      current_slot: 1
      related_slot: 0
      where:
        kind: comparison
        left: { kind: input, name: qualifies_for_child_element }
        op: eq
        right:
          kind: literal
          value: { kind: bool, value: true }

  - name: num_higher_rate_children
    entity: BenefitUnit
    dtype: integer
    unit: count
    source: "UC Regs 2013 reg 24(2) first child born before 6 April 2017"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/24"
    semantics: scalar
    expr:
      kind: count_related
      relation: child_of_benefit_unit
      current_slot: 1
      related_slot: 0
      where:
        kind: and
        items:
          - kind: comparison
            left: { kind: input, name: qualifies_for_child_element }
            op: eq
            right:
              kind: literal
              value: { kind: bool, value: true }
          - kind: comparison
            left: { kind: input, name: is_higher_rate_first_child }
            op: eq
            right:
              kind: literal
              value: { kind: bool, value: true }

  - name: num_standard_rate_children
    entity: BenefitUnit
    dtype: integer
    unit: count
    source: "UC Regs 2013 reg 24(2) every child other than the higher-rate first child"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/24"
    semantics: scalar
    expr:
      kind: count_related
      relation: child_of_benefit_unit
      current_slot: 1
      related_slot: 0
      where:
        kind: and
        items:
          - kind: comparison
            left: { kind: input, name: qualifies_for_child_element }
            op: eq
            right:
              kind: literal
              value: { kind: bool, value: true }
          - kind: comparison
            left: { kind: input, name: is_higher_rate_first_child }
            op: eq
            right:
              kind: literal
              value: { kind: bool, value: false }

  - name: child_element_total
    entity: BenefitUnit
    dtype: decimal
    unit: GBP
    source: "UC Regs 2013 reg 24(2) two-rate sum over qualifying children"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/24"
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: mul
          left:
            kind: derived
            name: num_higher_rate_children
          right:
            kind: parameter_lookup
            parameter: uc_child_element_higher
            index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: mul
          left:
            kind: derived
            name: num_standard_rate_children
          right:
            kind: parameter_lookup
            parameter: uc_child_element_standard
            index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: num_children_disabled_lower
    entity: BenefitUnit
    dtype: integer
    unit: count
    source: "UC Regs 2013 reg 24(2) (disabled child addition, lower rate)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/24"
    semantics: scalar
    expr:
      kind: count_related
      relation: child_of_benefit_unit
      current_slot: 1
      related_slot: 0
      where:
        kind: comparison
        left: { kind: input, name: disability_level }
        op: eq
        right:
          kind: literal
          value: { kind: text, value: lower }

  - name: num_children_disabled_higher
    entity: BenefitUnit
    dtype: integer
    unit: count
    source: "UC Regs 2013 reg 24(2) (disabled child addition, higher rate)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/24"
    semantics: scalar
    expr:
      kind: count_related
      relation: child_of_benefit_unit
      current_slot: 1
      related_slot: 0
      where:
        kind: comparison
        left: { kind: input, name: disability_level }
        op: eq
        right:
          kind: literal
          value: { kind: text, value: higher }

  - name: disabled_child_element_total
    entity: BenefitUnit
    dtype: decimal
    unit: GBP
    source: "UC Regs 2013 reg 24(2)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/24"
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: mul
          left:
            kind: derived
            name: num_children_disabled_lower
          right:
            kind: parameter_lookup
            parameter: uc_disabled_child_lower
            index: { kind: literal, value: { kind: integer, value: 0 } }
        - kind: mul
          left:
            kind: derived
            name: num_children_disabled_higher
          right:
            kind: parameter_lookup
            parameter: uc_disabled_child_higher
            index: { kind: literal, value: { kind: integer, value: 0 } }

  # ---------------------------------------------------------------------------
  # LCWRA element (UC Regs reg 27) — paid once per benefit unit.
  # ---------------------------------------------------------------------------

  - name: num_adults_with_lcwra
    entity: BenefitUnit
    dtype: integer
    unit: count
    source: "UC Regs 2013 reg 27 (LCWRA element)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/27"
    semantics: scalar
    expr:
      kind: count_related
      relation: adult_of_benefit_unit
      current_slot: 1
      related_slot: 0
      where:
        kind: comparison
        left: { kind: input, name: has_lcwra }
        op: eq
        right:
          kind: literal
          value: { kind: bool, value: true }

  - name: has_lcwra
    entity: BenefitUnit
    dtype: judgment
    unit: status
    source: "UC Regs 2013 reg 27"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/27"
    semantics: judgment
    expr:
      kind: comparison
      left:
        kind: derived
        name: num_adults_with_lcwra
      op: gte
      right:
        kind: literal
        value: { kind: integer, value: 1 }

  - name: lcwra_element
    entity: BenefitUnit
    dtype: decimal
    unit: GBP
    source: "UC Regs 2013 reg 27"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/27"
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: derived
        name: has_lcwra
      then_expr:
        kind: parameter_lookup
        parameter: uc_lcwra_element
        index: { kind: literal, value: { kind: integer, value: 0 } }
      else_expr:
        kind: literal
        value: { kind: decimal, value: "0" }

  # ---------------------------------------------------------------------------
  # Carer element (UC Regs reg 29) — paid once per benefit unit.
  # ---------------------------------------------------------------------------

  - name: num_adults_carer
    entity: BenefitUnit
    dtype: integer
    unit: count
    source: "UC Regs 2013 reg 29 (carer element)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/29"
    semantics: scalar
    expr:
      kind: count_related
      relation: adult_of_benefit_unit
      current_slot: 1
      related_slot: 0
      where:
        kind: comparison
        left: { kind: input, name: is_carer }
        op: eq
        right:
          kind: literal
          value: { kind: bool, value: true }

  - name: has_carer
    entity: BenefitUnit
    dtype: judgment
    unit: status
    source: "UC Regs 2013 reg 29"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/29"
    semantics: judgment
    expr:
      kind: comparison
      left:
        kind: derived
        name: num_adults_carer
      op: gte
      right:
        kind: literal
        value: { kind: integer, value: 1 }

  - name: carer_element
    entity: BenefitUnit
    dtype: decimal
    unit: GBP
    source: "UC Regs 2013 reg 29"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/29"
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: derived
        name: has_carer
      then_expr:
        kind: parameter_lookup
        parameter: uc_carer_element
        index: { kind: literal, value: { kind: integer, value: 0 } }
      else_expr:
        kind: literal
        value: { kind: decimal, value: "0" }

  # ---------------------------------------------------------------------------
  # Housing element (UC Regs reg 25) — eligible rent is supplied already net
  # of LHA cap or actual-rent cap per Schedules 1-5; non-dep deductions are a
  # pre-aggregated total per reg 28.
  # ---------------------------------------------------------------------------

  - name: housing_element
    entity: BenefitUnit
    dtype: decimal
    unit: GBP
    source: "UC Regs 2013 reg 25 and reg 28 (non-dep deductions)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/25"
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: input
            name: eligible_housing_costs
          right:
            kind: input
            name: non_dep_deductions_total

  # ---------------------------------------------------------------------------
  # Max UC (pre-deduction total of all elements, reg 22)
  # ---------------------------------------------------------------------------

  - name: max_uc
    entity: BenefitUnit
    dtype: decimal
    unit: GBP
    source: "UC Regs 2013 reg 22 (max UC)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/22"
    semantics: scalar
    expr:
      kind: add
      items:
        - kind: derived
          name: standard_allowance
        - kind: derived
          name: child_element_total
        - kind: derived
          name: disabled_child_element_total
        - kind: derived
          name: lcwra_element
        - kind: derived
          name: carer_element
        - kind: derived
          name: housing_element

  # ---------------------------------------------------------------------------
  # Work allowance (UC Regs reg 22(2) and Schedule 4) and earned-income taper.
  # Work allowance only applies where the claimant has responsibility for a
  # child OR has LCW/LCWRA.
  # ---------------------------------------------------------------------------

  - name: eligible_for_work_allowance
    entity: BenefitUnit
    dtype: judgment
    unit: status
    source: "UC Regs 2013 reg 22(2) (work allowance eligibility)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/22"
    semantics: judgment
    expr:
      kind: or
      items:
        - kind: comparison
          left:
            kind: derived
            name: num_qualifying_children
          op: gte
          right:
            kind: literal
            value: { kind: integer, value: 1 }
        - kind: derived
          name: has_lcwra

  - name: work_allowance_amount
    entity: BenefitUnit
    dtype: decimal
    unit: GBP
    source: "UC Regs 2013 reg 22(2) and Schedule 4 (work allowance)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/schedule/4"
    semantics: scalar
    expr:
      kind: if
      condition:
        kind: derived
        name: eligible_for_work_allowance
      then_expr:
        kind: if
        condition:
          kind: comparison
          left: { kind: input, name: has_housing_costs }
          op: eq
          right:
            kind: literal
            value: { kind: bool, value: true }
        then_expr:
          kind: parameter_lookup
          parameter: uc_work_allowance_with_housing
          index: { kind: literal, value: { kind: integer, value: 0 } }
        else_expr:
          kind: parameter_lookup
          parameter: uc_work_allowance_without_housing
          index: { kind: literal, value: { kind: integer, value: 0 } }
      else_expr:
        kind: literal
        value: { kind: decimal, value: "0" }

  - name: earnings_above_work_allowance
    entity: BenefitUnit
    dtype: decimal
    unit: GBP
    source: "UC Regs 2013 reg 22 (earned income taper)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/22"
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: input
            name: earned_income_monthly
          right:
            kind: derived
            name: work_allowance_amount

  - name: earnings_deduction
    entity: BenefitUnit
    dtype: decimal
    unit: GBP
    source: "UC Regs 2013 reg 22 (55% taper on earnings above work allowance)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/22"
    semantics: scalar
    expr:
      kind: mul
      left:
        kind: derived
        name: earnings_above_work_allowance
      right:
        kind: parameter_lookup
        parameter: uc_taper_rate
        index: { kind: literal, value: { kind: integer, value: 0 } }

  # ---------------------------------------------------------------------------
  # Capital tariff income (UC Regs reg 72). £4.35/month for every complete
  # £250 of capital above £6,000, up to the £16,000 disentitlement.
  # ---------------------------------------------------------------------------

  - name: capital_above_lower
    entity: BenefitUnit
    dtype: decimal
    unit: GBP
    source: "UC Regs 2013 reg 72 (tariff income from capital)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/72"
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: input
            name: capital_total
          right:
            kind: parameter_lookup
            parameter: uc_capital_lower
            index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: tariff_income
    entity: BenefitUnit
    dtype: decimal
    unit: GBP
    source: "UC Regs 2013 reg 72 (£4.35 per complete £250 above lower limit)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/72"
    semantics: scalar
    expr:
      kind: mul
      left:
        kind: floor
        value:
          kind: div
          left:
            kind: derived
            name: capital_above_lower
          right:
            kind: literal
            value: { kind: decimal, value: "250" }
      right:
        kind: parameter_lookup
        parameter: uc_capital_tariff_per_250
        index: { kind: literal, value: { kind: integer, value: 0 } }

  - name: over_capital_limit
    entity: BenefitUnit
    dtype: judgment
    unit: status
    source: "UC Regs 2013 reg 18 (capital limit at £16,000)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/18"
    semantics: judgment
    expr:
      kind: comparison
      left:
        kind: input
        name: capital_total
      op: gt
      right:
        kind: parameter_lookup
        parameter: uc_capital_upper
        index: { kind: literal, value: { kind: integer, value: 0 } }

  # ---------------------------------------------------------------------------
  # UC award (UC Regs reg 22) — max_uc reduced by unearned income pound-for-
  # pound, tariff income as unearned, and earned income at 55 pence per £.
  # ---------------------------------------------------------------------------

  - name: uc_award_before_capital_test
    entity: BenefitUnit
    dtype: decimal
    unit: GBP
    source: "UC Regs 2013 reg 22 (award = max UC minus deductions)"
    source_url: "https://www.legislation.gov.uk/uksi/2013/376/regulation/22"
    semantics: scalar
    expr:
      kind: max
      items:
        - kind: literal
          value: { kind: decimal, value: "0" }
        - kind: sub
          left:
            kind: sub
            left:
              kind: sub
              left:
                kind: derived
                name: max_uc
              right:
                kind: derived
                name: earnings_deduction
            right:
              kind: input
              name: unearned_income_monthly
          right:
            kind: derived
            name: tariff_income

  - name: uc_award
